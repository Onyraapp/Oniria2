<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b12;
  color:white;
}

.screen { display:none; padding:20px; }
.screen.active { display:block; }

button {
  padding:12px;
  margin-top:10px;
  width:100%;
  background:#7C5CFF;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

textarea {
  width:100%;
  height:150px;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

.card {
  background:#1a1a2e;
  padding:15px;
  border-radius:12px;
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<!-- HOME -->

<div class="screen active" id="s-home">
  <h1>ONYRA</h1>
  <p>¿Qué soñaste anoche?</p>
  <button onclick="go('compose')">Contar mi sueño</button>
</div>

<!-- COMPOSE -->

<div class="screen" id="s-compose">
  <h2>Contá tu sueño</h2>
  <textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>
  <button onclick="submitDream()">Interpretar</button>
  <button onclick="go('home')">Volver</button>
</div>

<!-- RESULT -->

<div class="screen" id="s-result">
  <div class="card">

```
<img id="dreamImage" />

<div id="imageLoading">Generando imagen...</div>

<h3 id="resultTitle"></h3>
<p id="resultText"></p>
```

  </div>

<button onclick="go('home')">Volver</button>

</div>

<script>

function go(s){
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.getElementById('s-' + s).classList.add('active');
}

function buildInterpretation(text){
  const t = text.toLowerCase();

  if(t.includes('persegu')){
    return {
      title: "La persecución silenciosa",
      interpretation: "Hay algo que estás evitando enfrentar."
    };
  }

  if(t.includes('volar')){
    return {
      title: "El impulso de escapar",
      interpretation: "Buscás libertad o salir de una situación."
    };
  }

  return {
    title: "Un sueño en movimiento",
    interpretation: "Tu mente está procesando emociones internas."
  };
}

async function generateDreamImage(text){
  const response = await fetch("https://onyra2-worker.almacenmujica.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ dream: text })
  });

  const data = await response.json();

  if(!response.ok){
    throw new Error(data.error || "Error en worker");
  }

  if(!data.imageUrl){
    throw new Error("No llegó imagen");
  }

  return data.imageUrl;
}
async function submitDream(){
  const text = document.getElementById('dreamInput').value;

  const result = buildInterpretation(text);

  document.getElementById('resultTitle').innerText = result.title;
  document.getElementById('resultText').innerText = result.interpretation;

  document.getElementById('imageLoading').style.display = "block";
  document.getElementById('dreamImage').src = "";

  go('result');

  try {
    const img = await generateDreamImage(text);
    document.getElementById('dreamImage').src = img;
  } catch(e){
    document.getElementById('resultText').innerText += " (Error generando imagen)";
  }

  document.getElementById('imageLoading').style.display = "none";
}

</script>

</body>
</html>
