<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at top, rgba(108,92,231,0.16), transparent 28%),
      linear-gradient(180deg, #090910 0%, #131320 55%, #1a1a27 100%);
    color: #fff;
    text-align: center;
    min-height: 100vh;
    padding: 28px 18px 40px;
  }

  .shell {
    max-width: 620px;
    margin: 0 auto;
  }

  .brand {
    margin-top: 8px;
    margin-bottom: 10px;
  }

  .brand h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .subtitle {
    margin: 10px auto 0;
    max-width: 460px;
    color: rgba(255,255,255,0.72);
    font-size: 16px;
    line-height: 1.5;
  }

  .panel {
    margin-top: 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 18px 50px rgba(0,0,0,0.28);
    border-radius: 24px;
    padding: 22px 18px 20px;
    backdrop-filter: blur(6px);
  }

  .panel-label {
    text-align: left;
    font-size: 13px;
    color: rgba(255,255,255,0.58);
    margin: 0 0 10px;
  }

  textarea {
    width: 100%;
    min-height: 130px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px;
    resize: none;
    background: rgba(0,0,0,0.22);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }

  textarea::placeholder {
    color: rgba(255,255,255,0.35);
  }

  textarea:focus {
    border-color: rgba(108,92,231,0.6);
    box-shadow: 0 0 0 4px rgba(108,92,231,0.12);
  }

  .hint {
    margin-top: 10px;
    text-align: left;
    font-size: 13px;
    color: rgba(255,255,255,0.48);
  }

  .main-action-wrap {
    margin-top: 18px;
  }

  .main-btn {
    width: 100%;
    max-width: 320px;
    border: none;
    border-radius: 16px;
    padding: 16px 22px;
    background: linear-gradient(135deg, #6c5ce7, #7d6cff);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(108,92,231,0.32);
    transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
  }

  .main-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 38px rgba(108,92,231,0.38);
  }

  .main-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .loading {
    display: none;
    margin-top: 18px;
    color: rgba(255,255,255,0.74);
    font-size: 14px;
  }

  .error {
    display: none;
    margin-top: 14px;
    color: #ffc2c2;
    font-size: 14px;
  }

  .result-card {
    display: none;
    position: relative;
    margin-top: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 18px 18px 16px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.28);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .result-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .clear-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  .result-title {
    margin: 4px 36px 14px 0;
    text-align: left;
    font-size: 14px;
    color: rgba(255,255,255,0.58);
  }

  #dreamImage {
    width: 100%;
    max-width: 390px;
    max-height: 510px;
    object-fit: cover;
    display: block;
    margin: 0 auto;
    border-radius: 18px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  }

  .interpretation-box {
    margin-top: 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 16px 16px 18px;
    text-align: left;
  }

  .interpretation-label {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }

  .interpretacion {
    white-space: pre-wrap;
    line-height: 1.72;
    font-size: 15px;
    color: rgba(255,255,255,0.94);
  }

  .result-actions {
    display: none;
    margin-top: 16px;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .result-actions.show {
    display: flex;
  }

  .secondary-btn {
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    padding: 12px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }

  .secondary-btn:hover {
    transform: translateY(-1px);
  }

  .microcopy {
    margin-top: 16px;
    color: rgba(255,255,255,0.42);
    font-size: 12px;
  }

  @media (max-width: 520px) {
    .brand h1 {
      font-size: 38px;
    }

    .subtitle {
      font-size: 15px;
    }

    .panel, .result-card {
      border-radius: 20px;
    }
  }
</style>
</head>

<body>
  <div class="shell">
    <div class="brand">
      <h1>ONYRA</h1>
      <div class="subtitle">
        Contá tu sueño y recibí una imagen poderosa con una interpretación emocional e inmediata.
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Escribí lo que soñaste</div>

      <textarea id="dreamInput" placeholder="Ej: soñé que volaba sobre una ciudad, pero no podía decidir dónde aterrizar..."></textarea>

      <div class="hint">Cuanto más concreto seas, más potente suele salir la imagen.</div>

      <div class="main-action-wrap">
        <button id="mainBtn" class="main-btn" onclick="submitDream()">Interpretar mi sueño</button>
      </div>

      <div id="loading" class="loading">Interpretando y generando imagen...</div>
      <div id="errorBox" class="error"></div>

      <div class="microcopy">La interpretación es simbólica e inspiracional.</div>
    </div>

    <div id="result" class="result-card">
      <button onclick="clearAll()" class="clear-btn">✕</button>
      <div class="result-title">Resultado</div>

      <img id="dreamImage" alt="Imagen generada del sueño">

      <div class="interpretation-box">
        <div class="interpretation-label">Interpretación</div>
        <div id="interpretation" class="interpretacion"></div>
      </div>
    </div>

    <div id="resultActions" class="result-actions">
      <button id="shareBtn" class="secondary-btn" onclick="shareDream()" disabled>Compartir</button>
      <button id="storyBtn" class="secondary-btn" onclick="downloadStory()" disabled>Compartir sueño</button>
    </div>
  </div>

<script>
const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";
const LOGO_URL = "og-image.svg";

let currentDream = {
  dream: "",
  interpretation: "",
  imageUrl: ""
};

async function submitDream() {
  const dream = dreamInput.value.trim();
  if (!dream) {
    alert("Escribí un sueño");
    return;
  }

  loading.style.display = "block";
  errorBox.style.display = "none";
  result.style.display = "none";
  result.classList.remove("show");
  resultActions.classList.remove("show");
  shareBtn.disabled = true;
  storyBtn.disabled = true;
  mainBtn.disabled = true;

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream })
    });

    const data = await res.json();

    if (!data.ok) throw new Error(data.error || "No se pudo interpretar");

    currentDream = {
      dream,
      interpretation: data.interpretation || "",
      imageUrl: data.imageUrl || ""
    };

    dreamImage.src = currentDream.imageUrl;
    interpretation.innerText = currentDream.interpretation;

    loading.style.display = "none";
    result.style.display = "block";

    requestAnimationFrame(() => {
      result.classList.add("show");
      resultActions.classList.add("show");
    });

    shareBtn.disabled = false;
    storyBtn.disabled = false;
    mainBtn.disabled = false;

    setTimeout(() => {
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 120);

  } catch (e) {
    loading.style.display = "none";
    errorBox.style.display = "block";
    errorBox.innerText = e.message || "Error";
    mainBtn.disabled = false;
  }
}

function shareDream() {
  const text = `Soñé: ${currentDream.dream}

${currentDream.interpretation}

${location.href}`;

  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text);
    alert("Texto copiado para compartir");
  }
}

function clearAll() {
  dreamInput.value = "";
  result.style.display = "none";
  result.classList.remove("show");
  resultActions.classList.remove("show");
  shareBtn.disabled = true;
  storyBtn.disabled = true;
  errorBox.style.display = "none";
  loading.style.display = "none";

  currentDream = {
    dream: "",
    interpretation: "",
    imageUrl: ""
  };

  dreamInput.focus();
}

function downloadStory() {
  if (!currentDream.imageUrl) {
    alert("Primero generá un sueño");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  const logo = new Image();

  img.src = currentDream.imageUrl;
  logo.src = LOGO_URL;

  let imageReady = false;
  let logoReady = false;

  function drawWhenReady() {
    if (!imageReady) return;

    canvas.width = 1080;
    canvas.height = 1920;

    const bg = ctx.createLinearGradient(0, 0, 0, 1920);
    bg.addColorStop(0, "#0a0a12");
    bg.addColorStop(1, "#1a1a2b");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 1080, 1920);

    if (logoReady) {
      ctx.shadowColor = "rgba(108,92,231,0.6)";
      ctx.shadowBlur = 30;
      drawLogo(ctx, logo);
      ctx.shadowBlur = 0;
    }

    ctx.drawImage(img, 140, 260, 800, 700);

    const g = ctx.createLinearGradient(0, 260, 0, 960);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.6)");
    ctx.fillStyle = g;
    ctx.fillRect(140, 260, 800, 700);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 60px Playfair Display";
    ctx.textAlign = "center";
    ctx.fillText("Tu sueño", 540, 1080);

    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "36px Inter";
    wrap(ctx, currentDream.interpretation, 540, 1200, 800, 50);

    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.font = "26px Inter";
    ctx.fillText("onyra.app", 540, 1820);

    canvas.toBlob(blob => {
      if (!blob) return;

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "onyra.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }, "image/png");
  }

  img.onload = () => {
    imageReady = true;
    drawWhenReady();
  };

  img.onerror = () => {
    alert("No se pudo cargar la imagen");
  };

  logo.onload = () => {
    logoReady = true;
    drawWhenReady();
  };

  logo.onerror = () => {
    logoReady = false;
  };
}

function drawLogo(ctx, img) {
  const w = 400, h = 140, x = 340, y = 40;
  const r = img.width / img.height;
  let dw = w, dh = w / r;
  if (dh > h) {
    dh = h;
    dw = h * r;
  }
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}

function wrap(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";
  for (let n = 0; n < words.length; n++) {
    const test = line + words[n] + " ";
    if (ctx.measureText(test).width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + " ";
      y += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}
</script>
</body>
</html>
