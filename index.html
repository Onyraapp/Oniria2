<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: white;
      margin: 0;
      padding: 24px;
      text-align: center;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border-radius: 14px;
      border: 1px solid #444;
      padding: 14px;
      font-size: 16px;
      margin-top: 16px;
      background: #191b33;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    .primary { background:#7c5cff; color:white; }
    .secondary { background:white; color:black; }
    .tertiary { background:#27c27a; color:white; }
    .quaternary { background:#ffb020; color:black; }

    #resultImage {
      width: 100%;
      max-width: 420px;
      margin-top: 20px;
      border-radius: 16px;
    }

    #interpretationBox {
      margin-top: 15px;
      display: none;
      background:#1b1e3a;
      padding:15px;
      border-radius:12px;
    }

    .gallery {
      margin-top: 40px;
    }

    .card {
      background:#1b1e3a;
      margin-bottom:15px;
      border-radius:12px;
      overflow:hidden;
      padding:10px;
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    .small {
      font-size:13px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>ONYRA</h1>
  <p>Descubrí qué dicen tus sueños</p>

  <textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

  <br>

  <button class="primary" onclick="submitDream()">Generar imagen</button>
  <button class="primary" onclick="interpretDream()">Interpretar sueño</button>
  <button class="secondary" onclick="shareDream()">Compartir</button>
  <button class="tertiary" onclick="saveDreamImage()">Guardar imagen</button>
  <button class="quaternary" onclick="saveToGallery()">Guardar en galería</button>

  <p id="status"></p>

  <img id="resultImage" style="display:none;" />

  <div id="interpretationBox">
    <h3>Interpretación</h3>
    <p id="interpretationText"></p>
  </div>

  <div class="gallery">
    <h2>Mi galería</h2>
    <div id="gallery"></div>
  </div>

</div>

<script>

const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";
const STORAGE_KEY = "onyra_gallery_v1";

let currentDream = {
  text:"",
  imageUrl:"",
  interpretation:""
};

document.addEventListener("DOMContentLoaded", renderGallery);

// GENERAR SOLO IMAGEN
async function submitDream() {
  const dream = document.getElementById("dreamInput").value.trim();
  if (!dream) return alert("Escribí algo");

  document.getElementById("status").innerText = "Generando...";

  const res = await fetch(WORKER_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ dream })
  });

  const data = await res.json();

  if (!data.ok) return alert("Error");

  showImage(data.imageUrl);

  currentDream = {
    text:dream,
    imageUrl:data.imageUrl,
    interpretation:""
  };

  document.getElementById("status").innerText = "Listo";
}

// GENERAR + INTERPRETAR
async function interpretDream() {
  const dream = document.getElementById("dreamInput").value.trim();
  if (!dream) return alert("Escribí algo");

  document.getElementById("status").innerText = "Interpretando...";

  const res = await fetch(WORKER_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ dream })
  });

  const data = await res.json();

  if (!data.ok) return alert("Error");

  showImage(data.imageUrl);

  document.getElementById("interpretationText").innerText = data.interpretation;
  document.getElementById("interpretationBox").style.display = "block";

  currentDream = {
    text:dream,
    imageUrl:data.imageUrl,
    interpretation:data.interpretation
  };

  document.getElementById("status").innerText = "Listo";
}

// MOSTRAR IMAGEN
function showImage(url){
  const img = document.getElementById("resultImage");
  img.src = url;
  img.style.display = "block";
}

// GUARDAR IMAGEN
function saveDreamImage(){
  if (!currentDream.imageUrl) return alert("Generá primero");

  const a = document.createElement("a");
  a.href = currentDream.imageUrl;
  a.download = "onyra.png";
  a.click();
}

// GUARDAR EN GALERIA
function saveToGallery(){
  if (!currentDream.imageUrl) return alert("Generá primero");

  const gallery = getGallery();

  gallery.unshift({
    id:Date.now(),
    ...currentDream,
    date:new Date().toLocaleString()
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(gallery));
  renderGallery();
}

// OBTENER GALERIA
function getGallery(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

// RENDER
function renderGallery(){
  const container = document.getElementById("gallery");
  const data = getGallery();

  if (!data.length){
    container.innerHTML = "<p class='small'>Sin sueños guardados</p>";
    return;
  }

  container.innerHTML = data.map(item => `
    <div class="card">
      <img src="${item.imageUrl}" />
      <p><b>${item.text}</b></p>
      ${item.interpretation ? `<p>${item.interpretation}</p>` : ""}
      <p class="small">${item.date}</p>

      <button onclick="deleteItem(${item.id})">Eliminar</button>
    </div>
  `).join("");
}

// ELIMINAR
function deleteItem(id){
  const filtered = getGallery().filter(x => x.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
  renderGallery();
}

// COMPARTIR
async function shareDream(){
  if (!currentDream.imageUrl) return alert("Generá primero");

  const text = `Soñé: "${currentDream.text}"`;

  try {
    const blob = await (await fetch(currentDream.imageUrl)).blob();
    const file = new File([blob], "sueno.png", {type:"image/png"});

    if (navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        text,
        files:[file]
      });
    } else {
      await navigator.share({ text });
    }

  } catch(e){
    alert("No se pudo compartir");
  }
}

</script>

</body>
</html>
