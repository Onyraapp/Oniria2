<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONYRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f1020;
      color: white;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      max-width: 400px;
      height: 100px;
      border-radius: 10px;
      border: none;
      padding: 10px;
    }

    button {
      margin: 8px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 10px;
      display: none;
    }

    #history {
      margin-top: 20px;
      text-align: left;
      max-width: 400px;
      margin-inline: auto;
    }

    .item {
      background: #1a1d3a;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🌙 ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

<button onclick="probarImagen()">Generar</button>
<button onclick="regenerar()">Regenerar</button>
<button onclick="shareDream()">Compartir</button>

<p id="status"></p>
<img id="dreamImage">

<div id="history"></div>

<script>

let lastDream = "";

function saveDream(dream) {
  let history = JSON.parse(localStorage.getItem("dreams") || "[]");
  history.unshift(dream);
  localStorage.setItem("dreams", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("dreams") || "[]");

  container.innerHTML = "<h3>Historial</h3>";

  history.slice(0,5).forEach(d => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = d;
    div.onclick = () => {
      document.getElementById("dreamInput").value = d;
    };
    container.appendChild(div);
  });
}

async function generateAIImage(dream) {
  const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ dream })
  });

  const data = await res.json();
  return data.imageUrl;
}

async function probarImagen() {
  const dream = document.getElementById("dreamInput").value;
  const img = document.getElementById("dreamImage");
  const status = document.getElementById("status");

  if (!dream) return;

  lastDream = dream;
  status.textContent = "Interpretando sueño...";
  img.style.display = "none";

  const url = await generateAIImage(dream);

  img.src = url;
  img.style.display = "block";
  status.textContent = "✨ Sueño interpretado";

  saveDream(dream);
}

function regenerar() {
  if (lastDream) probarImagen();
}

async function shareDream() {
  const img = document.getElementById("dreamImage");

  if (!img.src) return;

  if (navigator.share) {
    await navigator.share({
      title: "Mi sueño en ONYRA",
      text: lastDream,
      url: img.src
    });
  } else {
    alert("Compartir no disponible");
  }
}

renderHistory();

</script>

</body>
</html>
