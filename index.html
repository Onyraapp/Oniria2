<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#0f0f1a,#1c1c2e);
  color:white;
}

.container {
  max-width: 420px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  letter-spacing:3px;
}

textarea {
  width:100%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  font-size:14px;
  margin-top:15px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:12px;
  font-size:14px;
  cursor:pointer;
}

.primary {
  background:#6c5ce7;
  color:white;
}

.result-card {
  margin-top:20px;
  background:#1f1f2e;
  border-radius:16px;
  overflow:hidden;
}

.result-card img {
  width:100%;
}

.result-text {
  padding:15px;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
  font-size:12px;
  background:#2c2c3e;
  color:white;
}

#clearBtn {
  position:fixed;
  top:10px;
  right:10px;
  padding:8px 12px;
  font-size:11px;
  background:#2c2c3e;
}
</style>
</head>

<body>

<button id="clearBtn" onclick="clearAll()">Limpiar</button>

<div class="container">

<h1>ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea>

<button class="primary" onclick="submitDream()">Interpretar</button>

<div id="result"></div>

<div class="actions" id="actions" style="display:none;">
  <button onclick="saveDream()">Guardar</button>
  <button onclick="shareDream()">Story</button>
  <button onclick="toggleHistory()">Historial</button>
</div>

<div id="history"></div>

</div>

<canvas id="storyCanvas" width="1080" height="1920" style="display:none;"></canvas>

<script>

const WORKER_URL = "https://onyra-worker.almacenmujica.workers.dev";

let currentDream = {};
let history = JSON.parse(localStorage.getItem("onyraHistory")) || [];

async function submitDream() {
  const dream = document.getElementById("dreamInput").value.trim();

  if (!dream) return alert("Escribí un sueño");

  document.getElementById("result").innerHTML = "Interpretando...";
  document.getElementById("actions").style.display = "none";

  try {
    const res = await fetch(WORKER_URL, {
      method:"POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream })
    });

    const data = await res.json();

    currentDream = {
      dream,
      interpretation: data.text,
      image: data.imageUrl
    };

    renderResult();
    document.getElementById("actions").style.display = "flex";

  } catch (err) {
    document.getElementById("result").innerHTML = "Error";
  }
}

function renderResult() {
  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <img src="${currentDream.image}">
      <div class="result-text">
        <p>${currentDream.interpretation}</p>
      </div>
    </div>
  `;
}

function saveDream() {
  history.unshift(currentDream);
  localStorage.setItem("onyraHistory", JSON.stringify(history));
  alert("Guardado");
}

function toggleHistory() {
  const div = document.getElementById("history");

  if (div.innerHTML !== "") {
    div.innerHTML = "";
    return;
  }

  div.innerHTML = history.map(h => `
    <div style="margin-top:15px;">
      <img src="${h.image}" style="width:100%;border-radius:10px;">
      <p>${h.interpretation}</p>
    </div>
  `).join("");
}

// 🔥 STORY PREMIUM
function shareDream() {

  const canvas = document.getElementById("storyCanvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = currentDream.image;

  img.onload = function () {

    const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
    const newWidth = img.width * ratio;
    const newHeight = img.height * ratio;

    const x = (canvas.width - newWidth) / 2;
    const y = (canvas.height - newHeight) / 2;

    ctx.drawImage(img, x, y, newWidth, newHeight);

    const gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0,"rgba(0,0,0,0.2)");
    gradient.addColorStop(1,"rgba(0,0,0,0.9)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    ctx.font="bold 60px Arial";
    ctx.fillText("ONYRA",60,120);

    const first = getFirstSentence(currentDream.interpretation);
    const rest = currentDream.interpretation.replace(first,"");

    // CAJA PREMIUM
    roundRect(ctx,50,900,980,800,30);
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fill();

    ctx.strokeStyle="rgba(255,255,255,0.2)";
    ctx.stroke();

    ctx.fillStyle="white";
    ctx.font="bold 48px Arial";
    drawText(ctx, first,80,1000,900,60,4);

    ctx.font="32px Arial";
    drawText(ctx, rest,80,1250,900,45,8);

    const url = canvas.toDataURL();

    const link = document.createElement("a");
    link.download = "onyra_story.png";
    link.href = url;
    link.click();
  };
}

function drawText(ctx,text,x,y,maxWidth,lineHeight,maxLines){
  const words=text.split(" ");
  let line="";
  let lines=[];

  for(let i=0;i<words.length;i++){
    const test=line+words[i]+" ";
    const w=ctx.measureText(test).width;
    if(w>maxWidth && i>0){
      lines.push(line);
      line=words[i]+" ";
    } else {
      line=test;
    }
  }
  lines.push(line);

  lines=lines.slice(0,maxLines);

  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i],x,y+i*lineHeight);
  }
}

function getFirstSentence(text){
  const m=text.match(/.*?[.!?]/);
  return m?m[0]:text;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function clearAll(){
  document.getElementById("dreamInput").value="";
  document.getElementById("result").innerHTML="";
  document.getElementById("actions").style.display="none";
}

</script>

</body>
</html>
