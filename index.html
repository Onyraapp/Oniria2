<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONYRA</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111218;
      color: white;
      padding: 24px;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      background: #1a1c24;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #c8c8d0;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #3a3f52;
      background: #0f1118;
      color: white;
      font-size: 16px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    #generateBtn {
      background: #7c3aed;
      color: white;
    }

    #shareBtn {
      background: #10b981;
      color: white;
    }

    #status {
      min-height: 24px;
      color: #d8d8df;
      margin-bottom: 14px;
    }

    #dreamImage {
      display: none;
      width: 100%;
      border-radius: 14px;
      margin-top: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>ONYRA</h1>
    <div class="subtitle">Descubrí qué dicen tus sueños</div>

    <textarea id="dreamText" placeholder="Contá tu sueño..."></textarea>

    <div class="buttons">
      <button id="generateBtn" type="button">Generar imagen</button>
      <button id="shareBtn" type="button">Compartir mi sueño</button>
    </div>

    <div id="status"></div>

    <img id="dreamImage" alt="Imagen generada del sueño">
  </div>

  <script>
    let lastImageUrl = "";
    let currentDream = {};

    const dreamText = document.getElementById("dreamText");
    const generateBtn = document.getElementById("generateBtn");
    const shareBtn = document.getElementById("shareBtn");
    const statusEl = document.getElementById("status");
    const dreamImage = document.getElementById("dreamImage");

    function setStatus(texto) {
      statusEl.textContent = texto;
    }

    function escapeXml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    async function submitDream() {
      try {
        const texto = dreamText.value.trim();

        if (!texto) {
          alert("Escribí tu sueño primero.");
          return;
        }

        setStatus("Generando imagen...");

        const imageUrl = await generateAIImage(texto);

        currentDream = {
          text: texto,
          image: imageUrl
        };
        lastImageUrl = imageUrl;

        dreamImage.src = imageUrl;
        dreamImage.style.display = "block";

        setStatus("Imagen generada.");
      } catch (error) {
        console.error("Error en submitDream:", error);
        setStatus("Error al generar imagen.");
        alert("No se pudo generar la imagen.");
      }
    }

    async function shareDream() {
      try {
        const texto = dreamText.value.trim() || "Mirá mi sueño en ONYRA";
        const imageUrl = lastImageUrl || currentDream.image;

        if (!imageUrl) {
          alert("Primero generá una imagen.");
          return;
        }

        setStatus("Preparando para compartir...");

        const blob = await urlToBlob(imageUrl);
        const file = new File([blob], "onyra-sueno.svg", { type: blob.type || "image/svg+xml" });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: texto,
            files: [file]
          });
          setStatus("Imagen compartida.");
          return;
        }

        const link = document.createElement("a");
        link.href = imageUrl;
        link.download = "onyra-sueno.svg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setStatus("Tu navegador no permite compartir directo. Se descargó la imagen.");
      } catch (error) {
        console.error("Error en shareDream:", error);
        setStatus("No se pudo compartir la imagen.");
        alert("No se pudo compartir la imagen.");
      }
    }

    function generateDreamImage(texto) {
      const seguro = escapeXml(texto);

      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">' +
          '<rect width="1080" height="1350" fill="#1f1b4d"/>' +
          '<rect x="60" y="60" width="960" height="1230" rx="36" fill="#2f2a6f"/>' +
          '<text x="540" y="170" text-anchor="middle" font-size="64" font-family="Arial" fill="white" font-weight="bold">ONYRA</text>' +
          '<text x="540" y="225" text-anchor="middle" font-size="28" font-family="Arial" fill="white">Tu sueño convertido en imagen</text>' +
          '<text x="100" y="360" font-size="36" font-family="Arial" fill="white">' + wrapSvgText(seguro, 100, 360, 880, 48) + '</text>' +
          '<text x="540" y="1180" text-anchor="middle" font-size="24" font-family="Arial" fill="white">Compartido desde ONYRA</text>' +
        '</svg>';

      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    function wrapSvgText(text, x, y, maxWidth, lineHeight) {
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";

      for (let i = 0; i < words.length; i++) {
        const testLine = line ? line + " " + words[i] : words[i];
        if (testLine.length > 38) {
          lines.push(line);
          line = words[i];
        } else {
          line = testLine;
        }
      }

      if (line) lines.push(line);

      let result = "";
      for (let j = 0; j < lines.length; j++) {
        const dy = j === 0 ? 0 : lineHeight;
        result += '<tspan x="' + x + '" dy="' + dy + '">' + lines[j] + '</tspan>';
      }
      return result;
    }

    async function urlToBlob(url) {
      const response = await fetch(url);
      return await response.blob();
    }

    generateBtn.addEventListener("click", submitDream);
    shareBtn.addEventListener("click", shareDream);
    async function generateAIImage(texto) {
  const response = await fetch("PEGÁ_ACÁ_TU_URL_DEL_WORKER", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt: texto
    })
  });

  if (!response.ok) {
    throw new Error("La API no respondió bien");
  }

  const data = await response.json();

  if (!data.imageUrl) {
    throw new Error("La respuesta no trajo imageUrl");
  }

  return data.imageUrl;
}
  </script>
</body>
</html>
