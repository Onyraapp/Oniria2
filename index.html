<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f1020;
  color: white;
  text-align: center;
  padding: 20px;
}

textarea {
  width: 90%;
  max-width: 400px;
  height: 100px;
  border-radius: 10px;
  border: none;
  padding: 10px;
}

button {
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
}

.danger {
  background: #d64545;
}

img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
  display: none;
}

#interpretation {
  margin-top: 10px;
  color: #bfc3ff;
}
</style>
</head>

<body>

<h1>🌙 ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

<button onclick="probarImagen()">Interpretar sueño</button>
<button onclick="regenerar()">Otra versión</button>
<button onclick="shareDream()">Compartir</button>
<button class="danger" onclick="resetHistory()">Reset historial</button>

<p id="status"></p>

<img id="dreamImage">
<p id="interpretation"></p>

<script>

let lastDream = "";

async function generateAI(dream) {
  const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ dream })
  });

  return await res.json();
}

async function probarImagen() {
  const dream = document.getElementById("dreamInput").value;
  const img = document.getElementById("dreamImage");
  const status = document.getElementById("status");

  if (!dream) return;

  lastDream = dream;
  status.textContent = "Interpretando...";
  img.style.display = "none";

  const data = await generateAI(dream);

  img.src = data.imageUrl;
  img.style.display = "block";

  document.getElementById("interpretation").textContent = data.interpretation;

  status.textContent = "✨ Listo";
}

function regenerar() {
  if (lastDream) probarImagen();
}

async function shareDream() {
  const img = document.getElementById("dreamImage");

  if (!img.src) return;

  if (navigator.share) {
    await navigator.share({
      title: "Mi sueño en ONYRA",
      text: lastDream,
      url: img.src
    });
  }
}

function resetHistory() {
  localStorage.removeItem("dreams");
}

</script>

</body>
</html>
