<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0d0d14;
      color: #f2f2f2;
      min-height: 100vh;
    }
    /* RESULTADO PREMIUM */

.result-card {
  background: #11111a;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.06);
}

/* Imagen tipo portada */
.image-wrap {
  position: relative;
  width: 100%;
  height: 260px;
  overflow: hidden;
}

.result-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.image-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 20%,
    rgba(0,0,0,0.8) 100%
  );
}

/* Contenido */
.result-content {
  padding: 20px;
}

/* Título más editorial */
.result-title {
  font-size: 22px;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}

/* Texto mejorado */
.result-text {
  white-space: pre-wrap;
  line-height: 1.7;
  font-size: 16px;
  color: #eaeaf3;
}

/* Botones premium */
.premium-actions {
  margin-top: 18px;
}

.secondary-btn {
  background: #1c1c2b;
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s ease;
}

.secondary-btn:hover {
  background: #26263a;
  transform: translateY(-1px);
}
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
    }

    .brand p {
      margin: 8px 0 0;
      color: #b7b7c9;
      font-size: 15px;
    }

    .card {
      background: #171723;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      background: #0f0f18;
      color: #fff;
      margin-bottom: 14px;
    }

    select {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      background: #0f0f18;
      color: #fff;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      width: 100%;
      background: #f3e7b3;
      color: #161616;
      font-weight: bold;
    }

    .actions {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .secondary-btn {
      background: #252538;
      color: #fff;
    }

    .result-wrap {
      display: none;
      margin-top: 18px;
    }

    .result-image {
      width: 100%;
      border-radius: 16px;
      display: none;
      margin-bottom: 14px;
      background: #0f0f18;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .result-text {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #e6e6ef;
    }

    .history-wrap {
      display: none;
      margin-top: 22px;
    }

    .history-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      background: #171723;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
    }

    .history-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .history-item small {
      color: #a7a7b8;
      display: block;
      margin-top: 6px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #cfcfda;
      min-height: 20px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .clear-btn {
      display: none;
      padding: 8px 12px;
      font-size: 13px;
      background: transparent;
      color: #bdbdd1;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
    }

    @media (max-width: 640px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="brand">
      <h1>ONYRA</h1>
      <p>Descubrí qué dicen tus sueños</p>
    </div>

    <div class="topbar">
      <button id="clearBtn" class="clear-btn" onclick="clearAll()">Limpiar</button>
    </div>

    <div class="card">
      <textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea>

      <select id="modeSelect">
        <option value="simbolico">Modo simbólico</option>
        <option value="emocional">Modo emocional</option>
        <option value="psicoanalitico">Modo psicoanalítico</option>
      </select>

      <button id="interpretBtn" class="primary-btn" onclick="submitDream()">Interpretar</button>

      <div id="status" class="status"></div>

      <div id="actions" class="actions">
        <button class="secondary-btn" onclick="saveDream()">Guardar</button>
        <button class="secondary-btn" onclick="shareDream()">Compartir sueño</button>
        <button class="secondary-btn" onclick="toggleHistory()">Historial</button>
      </div>
    </div>

   <div id="resultWrap" class="result-wrap">
  <div class="result-card">
    
    <div class="image-wrap">
      <img id="resultImage" class="result-image" alt="Imagen del sueño" />
      <div class="image-overlay"></div>
    </div>

    <div class="result-content">
      <h2 class="result-title">Interpretación</h2>
      <div id="resultText" class="result-text"></div>

      <div id="actions" class="actions premium-actions">
        <button class="secondary-btn" onclick="saveDream()">Guardar</button>
        <button class="secondary-btn" onclick="shareDream()">Compartir sueño</button>
        <button class="secondary-btn" onclick="toggleHistory()">Historial</button>
      </div>

    </div>
  </div>
</div>
      <div class="card">
        <img id="resultImage" class="result-image" alt="Imagen del sueño" />
        <h2 class="result-title">Interpretación</h2>
        <div id="resultText" class="result-text"></div>
      </div>
    </div>

    <div id="historyWrap" class="history-wrap">
      <h3 class="history-title">Historial</h3>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";
    const APP_LINK = window.location.href;

    let currentDream = {
      dream: "",
      mode: "",
      interpretation: "",
      image: ""
    };

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem("onyra_history")) || [];
      } catch {
        return [];
      }
    }

    function setHistory(items) {
      localStorage.setItem("onyra_history", JSON.stringify(items));
    }

    function renderHistory() {
      const history = getHistory();
      const historyList = document.getElementById("historyList");
      const historyWrap = document.getElementById("historyWrap");

      historyList.innerHTML = "";

      if (!history.length) {
        historyList.innerHTML = `<div class="history-item">Todavía no guardaste sueños.</div>`;
        historyWrap.style.display = "block";
        return;
      }

      history.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <strong>${item.dream.slice(0, 70)}${item.dream.length > 70 ? "..." : ""}</strong>
          <div>${item.interpretation.slice(0, 110)}${item.interpretation.length > 110 ? "..." : ""}</div>
          <small>${item.mode} · ${item.date}</small>
        `;
        div.onclick = () => loadHistoryItem(index);
        historyList.appendChild(div);
      });

      historyWrap.style.display = "block";
    }

    function loadHistoryItem(index) {
      const history = getHistory();
      const item = history[index];
      if (!item) return;

      currentDream = item;

      document.getElementById("dreamInput").value = item.dream;
      document.getElementById("modeSelect").value = item.mode;
      document.getElementById("resultText").textContent = item.interpretation;
      document.getElementById("resultWrap").style.display = "block";
      document.getElementById("actions").style.display = "grid";
      document.getElementById("clearBtn").style.display = "inline-block";

      const img = document.getElementById("resultImage");
      if (item.image) {
        img.src = item.image;
        img.style.display = "block";
      } else {
        img.src = "";
        img.style.display = "none";
      }
    }

    async function submitDream() {
      const dream = document.getElementById("dreamInput").value.trim();
      const mode = document.getElementById("modeSelect").value;
      const status = document.getElementById("status");
      const resultWrap = document.getElementById("resultWrap");
      const resultText = document.getElementById("resultText");
      const actions = document.getElementById("actions");
      const interpretBtn = document.getElementById("interpretBtn");
      const clearBtn = document.getElementById("clearBtn");
      const img = document.getElementById("resultImage");

      if (!dream) {
        status.textContent = "Escribí un sueño antes de interpretar.";
        return;
      }

      status.textContent = "Interpretando...";
      interpretBtn.disabled = true;
      resultWrap.style.display = "none";
      actions.style.display = "none";

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream, mode })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || "No se pudo interpretar el sueño.");
        }

        currentDream = {
          dream,
          mode,
          interpretation: data.interpretation || "No se pudo generar una interpretación.",
          image: data.imageUrl || "",
          date: new Date().toLocaleString("es-AR")
        };

        resultText.textContent = currentDream.interpretation;

        if (currentDream.image) {
  img.src = currentDream.image;
  img.style.display = "block";
} else {
  img.style.display = "none";
}

        resultWrap.style.display = "block";
        actions.style.display = "grid";
        clearBtn.style.display = "inline-block";
        status.textContent = "Listo.";
      } catch (error) {
        status.textContent = "Error: " + error.message;
      } finally {
        interpretBtn.disabled = false;
      }
    }

    function saveDream() {
      if (!currentDream.dream || !currentDream.interpretation) return;

      const history = getHistory();
      history.unshift({
        ...currentDream,
        date: currentDream.date || new Date().toLocaleString("es-AR")
      });

      setHistory(history);
      renderHistory();
      document.getElementById("status").textContent = "Sueño guardado.";
    }

    async function shareDream() {
      if (!currentDream.dream || !currentDream.interpretation) return;

      const shareText =
`Soñé:
${currentDream.dream}

Interpretación:
${currentDream.interpretation}

Probalo en ONYRA:
${APP_LINK}`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: shareText
          });
          document.getElementById("status").textContent = "Sueño compartido.";
        } else {
          await navigator.clipboard.writeText(shareText);
          document.getElementById("status").textContent = "Texto copiado para compartir.";
        }
      } catch (e) {
        document.getElementById("status").textContent = "No se pudo compartir.";
      }
    }

    function toggleHistory() {
      const wrap = document.getElementById("historyWrap");
      if (wrap.style.display === "block") {
        wrap.style.display = "none";
      } else {
        renderHistory();
      }
    }

    function clearAll() {
      document.getElementById("dreamInput").value = "";
      document.getElementById("modeSelect").value = "simbolico";
      document.getElementById("status").textContent = "";
      document.getElementById("resultText").textContent = "";
      document.getElementById("resultWrap").style.display = "none";
      document.getElementById("actions").style.display = "none";
      document.getElementById("historyWrap").style.display = "none";
      document.getElementById("clearBtn").style.display = "none";

      const img = document.getElementById("resultImage");
      img.src = "";
      img.style.display = "none";

      currentDream = {
        dream: "",
        mode: "",
        interpretation: "",
        image: ""
      };
    }

    renderHistory();
    document.getElementById("historyWrap").style.display = "none";
  </script>
</body>
</html>
