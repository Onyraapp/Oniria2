<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TIPOGRAFÍAS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #0b0b12, #1a1a26);
  color: #fff;
  text-align: center;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 1px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

textarea {
  width: 90%;
  max-width: 520px;
  height: 110px;
  border-radius: 12px;
  padding: 12px;
  border: none;
  margin-bottom: 15px;
}

button {
  padding: 12px 20px;
  margin: 6px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
  cursor: pointer;
}

button:disabled { opacity: 0.4; }
.secondary { background: #2d2d3a; }

.card {
  margin-top: 24px;
  padding: 18px;
  border-radius: 18px;
  background: #181822;
  max-width: 560px;
  margin: auto;
}

img {
  width: 100%;
  max-width: 380px;
  max-height: 500px;
  object-fit: cover;
  border-radius: 16px;
  margin-top: 10px;
}

.interpretacion {
  margin-top: 16px;
  text-align: left;
  line-height: 1.6;
}

.loading { margin-top: 20px; }
.error { color: #ffb3b3; display:none; }
</style>
</head>

<body>

<h1>ONYRA</h1>
<div class="subtitle">Descubrí qué dicen tus sueños</div>

<textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

<div>
<button onclick="submitDream()">Interpretar</button>

<button id="shareBtn" onclick="shareDream()" disabled>Compartir</button>
<button id="storyBtn" onclick="downloadStory()" disabled>Compartir imagen</button>
</div>

<div id="loading" class="loading" style="display:none;">Generando...</div>
<div id="errorBox" class="error"></div>

<div id="result" class="card" style="display:none;">
  <img id="dreamImage">
  <div id="interpretation" class="interpretacion"></div>
</div>

<script>

const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";
const LOGO_URL = "og-image.svg";

let currentDream = { dream:"", interpretation:"", image:"" };

async function submitDream(){
  const dream=dreamInput.value.trim();
  if(!dream) return alert("Escribí un sueño");

  loading.style.display="block";
  result.style.display="none";
  errorBox.style.display="none";
  shareBtn.disabled=true;
  storyBtn.disabled=true;

  try{
    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({dream})
    });

    const data=await res.json();
    if(!data.ok) throw new Error(data.error);

    currentDream={dream,interpretation:data.interpretation,image:data.imageUrl};

    dreamImage.src=data.imageUrl;
    interpretation.innerText=data.interpretation;

    loading.style.display="none";
    result.style.display="block";
    shareBtn.disabled=false;
    storyBtn.disabled=false;

  }catch(e){
    loading.style.display="none";
    errorBox.style.display="block";
    errorBox.innerText=e.message;
  }
}

function shareDream(){
  const text=`Soñé: ${currentDream.dream}

${currentDream.interpretation}

${location.href}`;

  navigator.share ? navigator.share({text}) : navigator.clipboard.writeText(text);
}

function clearAll(){
  dreamInput.value="";
  result.style.display="none";
  shareBtn.disabled=true;
  storyBtn.disabled=true;
  currentDream={dream:"",interpretation:"",image:""};
}

function downloadStory(){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  const img=new Image();
  const logo=new Image();

  img.src=currentDream.image;
  logo.src=LOGO_URL;

  let ready=0;

  function draw(){
    if(ready<1) return;

    canvas.width=1080;
    canvas.height=1920;

    // fondo
    const bg=ctx.createLinearGradient(0,0,0,1920);
    bg.addColorStop(0,"#0a0a12");
    bg.addColorStop(1,"#1a1a2b");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,1080,1920);

    // logo
    if(logo.complete){
      ctx.shadowColor="rgba(108,92,231,0.6)";
      ctx.shadowBlur=30;
      drawLogoContain(ctx,logo,340,40,400,140);
      ctx.shadowBlur=0;
    }

    // imagen + overlay
    ctx.drawImage(img,140,260,800,700);

    const gradient=ctx.createLinearGradient(0,260,0,960);
    gradient.addColorStop(0,"rgba(0,0,0,0)");
    gradient.addColorStop(1,"rgba(0,0,0,0.6)");
    ctx.fillStyle=gradient;
    ctx.fillRect(140,260,800,700);

    // título
    ctx.fillStyle="#fff";
    ctx.font="bold 64px Playfair Display";
    ctx.textAlign="center";
    ctx.fillText("Tu sueño",540,1080);

    // subtítulo
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.font="28px Inter";
    ctx.fillText("interpretado por ONYRA",540,1130);

    // texto
    ctx.fillStyle="#fff";
    ctx.font="36px Inter";
    wrapText(ctx,currentDream.interpretation,540,1220,800,52);

    // footer
    ctx.fillStyle="rgba(255,255,255,0.4)";
    ctx.font="26px Inter";
    ctx.fillText("onyra.app",540,1820);

    canvas.toBlob(function(blob){
      const url=URL.createObjectURL(blob);
      const link=document.createElement("a");
      link.href=url;
      link.download="onyra.png";
      document.body.appendChild(link);

      /iPhone|iPad/.test(navigator.userAgent)
        ? window.open(url)
        : link.click();

      document.body.removeChild(link);
    });
  }

  img.onload=()=>{ready++;draw();}
  logo.onload=()=>{draw();}

}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    if(ctx.measureText(testLine).width>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,y);
}

function drawLogoContain(ctx,img,x,y,w,h){
  const r=img.width/img.height;
  let dw=w,dh=w/r;
  if(dh>h){dh=h;dw=h*r;}
  ctx.drawImage(img,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
}

</script>

</body>
</html>
