<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f1020;
  color: white;
  text-align: center;
  padding: 20px;
}

textarea, select {
  width: 90%;
  max-width: 400px;
  margin: 6px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin: 6px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
}

img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<h1>🌙 ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

<select id="style">
  <option value="oscuro">Oscuro</option>
  <option value="cine">Cine</option>
  <option value="surreal">Surreal</option>
</select><br>

<button onclick="generar()">Generar imagen</button>
<button onclick="testWorker()">Test conexión</button>

<p id="status"></p>

<img id="img">

<script>

const WORKER = "https://onyra-final-ok.almacenmujica.workers.dev";
let lastBlobUrl = "";

function dataUrlToBlobUrl(dataUrl) {
  const parts = dataUrl.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const binary = atob(parts[1]);
  const len = binary.length;
  const bytes = new Uint8Array(len);

  for (let i = 0; i < len; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  const blob = new Blob([bytes], { type: mime });
  return URL.createObjectURL(blob);
}

async function generar() {
  const dream = document.getElementById("dreamInput").value.trim();
  const style = document.getElementById("style").value;
  const status = document.getElementById("status");
  const img = document.getElementById("img");

  if (!dream) {
    status.textContent = "Escribí un sueño primero.";
    return;
  }

  try {
    status.textContent = "Generando...";
    img.style.display = "none";

    const res = await fetch(WORKER, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ dream, style })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Error generando imagen");
    }

    if (!data.imageUrl) {
      throw new Error("No vino imageUrl");
    }

    if (lastBlobUrl) {
      URL.revokeObjectURL(lastBlobUrl);
    }

    lastBlobUrl = dataUrlToBlobUrl(data.imageUrl);

    img.src = lastBlobUrl;
    img.style.display = "block";

    status.textContent = "✨ Imagen generada";

  } catch (e) {
    console.error(e);
    status.textContent = "ERROR: " + e.message;
  }
}

// -------- TEST CONEXIÓN --------
async function testWorker() {
  const status = document.getElementById("status");

  try {
    status.textContent = "Probando conexión...";

    const res = await fetch(WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream: "test", style: "cine" })
    });

    const text = await res.text();

    status.textContent = "STATUS: " + res.status + " | RESP: " + text;

  } catch (e) {
    status.textContent = "ERROR: " + e.message;
  }
}

</script>

</body>
</html>
