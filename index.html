<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #222 0%, #111 35%, #090909 100%);
      color: #f4f1ea;
      min-height: 100vh;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 18px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .logo {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cfc7bb;
      font-size: 15px;
      line-height: 1.5;
      max-width: 520px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .primary {
      background: #f1dfb6;
      color: #111;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result-card {
      overflow: hidden;
      padding: 0;
    }

    .image-wrap {
      width: 100%;
      min-height: 240px;
      background: linear-gradient(180deg, #181818, #0e0e0e);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .image-wrap img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 460px;
    }

    .image-placeholder {
      color: #b9b0a2;
      padding: 36px 20px;
      text-align: center;
      font-size: 14px;
    }

    .result-body {
      padding: 20px;
    }

    .mode-badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: #111;
      background: #f1dfb6;
      padding: 7px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .result-title {
      font-size: 24px;
      margin: 0 0 10px;
    }

    .dream-preview {
      color: #cfc7bb;
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .interpretation {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 16px;
      color: #f4f1ea;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .history-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .history-item small {
      display: block;
      color: #bfb7ab;
      margin-top: 6px;
    }

    .status {
      font-size: 14px;
      color: #d3cabd;
      margin-top: 10px;
      min-height: 18px;
    }

    @media (max-width: 640px) {
      .buttons {
        grid-template-columns: 1fr;
      }
      .logo {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="logo">ONYRA</div>
      <div class="subtitle">
        Descubrí posibles sentidos detrás de tus sueños con una lectura visual, emocional o psicoanalítica.
      </div>
    </div>

    <div class="panel">
      <textarea id="dreamInput" placeholder="Escribí lo que soñaste..."></textarea>

      <div class="controls">
        <select id="modeSelect">
          <option value="intuitiva">Modo Intuitiva</option>
          <option value="emocional">Modo Emocional</option>
          <option value="psicoanalitica">Modo Psicoanalítica</option>
        </select>

        <div class="buttons">
          <button class="primary" id="interpretBtn" onclick="submitDream()">Interpretar sueño</button>
          <button class="secondary" id="imageBtn" onclick="generateImage()">Generar imagen</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="panel result-card" id="resultCard" style="display:none;">
      <div class="image-wrap" id="imageWrap">
        <div class="image-placeholder">Todavía no generaste una imagen para este sueño.</div>
      </div>
      <div class="result-body">
        <div class="mode-badge" id="modeBadge">Modo</div>
        <h2 class="result-title">Tu sueño</h2>
        <div class="dream-preview" id="dreamPreview"></div>
        <div class="interpretation" id="interpretationText"></div>

        <div class="result-actions">
          <button class="primary" onclick="shareDream()">Compartir</button>
          <button class="secondary" onclick="saveCurrentToHistory()">Guardar en historial</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3 class="history-title">Historial</h3>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://TU-WORKER.workers.dev";

    let currentDream = {
      dream: "",
      mode: "",
      interpretation: "",
      image: ""
    };

    function setStatus(text) {
      document.getElementById("status").textContent = text || "";
    }

    function prettyMode(mode) {
      if (mode === "emocional") return "Emocional";
      if (mode === "psicoanalitica" || mode === "psicoanalítica") return "Psicoanalítica";
      return "Intuitiva";
    }

    async function submitDream() {
      const dream = document.getElementById("dreamInput").value.trim();
      const mode = document.getElementById("modeSelect").value;
      const interpretBtn = document.getElementById("interpretBtn");

      if (!dream) {
        setStatus("Primero escribí un sueño.");
        return;
      }

      interpretBtn.disabled = true;
      setStatus("Interpretando sueño...");

      try {
        const res = await fetch(`${WORKER_URL}/interpret`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream, mode })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data?.error || "No se pudo interpretar");
        }

        currentDream = {
          dream,
          mode: data.mode,
          interpretation: data.interpretation,
          image: currentDream.image || ""
        };

        renderResult();
        setStatus("Interpretación lista.");
      } catch (err) {
        console.error(err);
        setStatus("Error al interpretar el sueño.");
      } finally {
        interpretBtn.disabled = false;
      }
    }

    async function generateImage() {
      const dream = document.getElementById("dreamInput").value.trim();
      const imageBtn = document.getElementById("imageBtn");

      if (!dream) {
        setStatus("Primero escribí un sueño.");
        return;
      }

      imageBtn.disabled = true;
      setStatus("Generando imagen...");

      try {
        const res = await fetch(`${WORKER_URL}/generate-image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data?.error || "No se pudo generar la imagen");
        }

        currentDream.dream = dream;
        currentDream.image = data.imageUrl;

        renderImage();
        setStatus("Imagen generada.");
      } catch (err) {
        console.error(err);
        setStatus("Error al generar la imagen.");
      } finally {
        imageBtn.disabled = false;
      }
    }

    function renderResult() {
      document.getElementById("resultCard").style.display = "block";
      document.getElementById("modeBadge").textContent = prettyMode(currentDream.mode);
      document.getElementById("dreamPreview").textContent = currentDream.dream;
      document.getElementById("interpretationText").textContent = currentDream.interpretation;
      renderImage();
    }

    function renderImage() {
      const imageWrap = document.getElementById("imageWrap");

      if (currentDream.image) {
        imageWrap.innerHTML = `<img src="${currentDream.image}" alt="Imagen del sueño">`;
      } else {
        imageWrap.innerHTML = `<div class="image-placeholder">Todavía no generaste una imagen para este sueño.</div>`;
      }
    }

    function saveCurrentToHistory() {
      if (!currentDream.dream || !currentDream.interpretation) {
        setStatus("Todavía no hay un sueño interpretado para guardar.");
        return;
      }

      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");

      history.unshift({
        ...currentDream,
        createdAt: new Date().toISOString()
      });

      localStorage.setItem("onyra_history", JSON.stringify(history.slice(0, 20)));
      renderHistory();
      setStatus("Sueño guardado en historial.");
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");
      const list = document.getElementById("historyList");

      if (!history.length) {
        list.innerHTML = `<div class="history-item">Todavía no guardaste sueños.</div>`;
        return;
      }

      list.innerHTML = history.map((item, index) => `
        <div class="history-item" onclick="loadHistoryItem(${index})">
          <strong>${escapeHtml(item.dream.slice(0, 70))}${item.dream.length > 70 ? "..." : ""}</strong>
          <small>${prettyMode(item.mode)} · ${new Date(item.createdAt).toLocaleString()}</small>
        </div>
      `).join("");
    }

    function loadHistoryItem(index) {
      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");
      const item = history[index];
      if (!item) return;

      currentDream = item;
      document.getElementById("dreamInput").value = item.dream;
      document.getElementById("modeSelect").value = normalizeModeValue(item.mode);
      renderResult();
      setStatus("Sueño cargado desde historial.");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function normalizeModeValue(mode) {
      if (mode === "psicoanalítica") return "psicoanalitica";
      return mode || "intuitiva";
    }

    async function shareDream() {
      if (!currentDream.dream || !currentDream.interpretation) {
        setStatus("Todavía no hay contenido para compartir.");
        return;
      }

      const text = `✨ ONYRA\n\nSueño:\n${currentDream.dream}\n\nInterpretación (${prettyMode(currentDream.mode)}):\n${currentDream.interpretation}`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text
          });
          setStatus("Compartido.");
        } else {
          await navigator.clipboard.writeText(text);
          setStatus("No se pudo abrir compartir, pero copié el texto al portapapeles.");
        }
      } catch (err) {
        console.error(err);
        setStatus("No se pudo compartir.");
      }
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderHistory();
  </script>
</body>
</html>
