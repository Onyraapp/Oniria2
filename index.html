<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ONYRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0b12, #1a1a26);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 20px;
    }

    textarea {
      width: 90%;
      max-width: 520px;
      height: 110px;
      border-radius: 12px;
      padding: 12px;
      border: none;
      margin-bottom: 15px;
      font-size: 14px;
      resize: none;
      box-sizing: border-box;
    }

    .buttons {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .secondary {
      background: #2d2d3a;
    }

    .card {
      margin-top: 24px;
      padding: 18px;
      border-radius: 18px;
      background: #181822;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    img {
      width: 100%;
      max-width: 380px;
      max-height: 500px;
      object-fit: cover;
      border-radius: 16px;
      margin-top: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .interpretacion {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.65;
      text-align: left;
      white-space: pre-wrap;
    }

    .loading {
      margin-top: 20px;
      opacity: 0.78;
    }

    .error {
      margin-top: 14px;
      color: #ffb3b3;
      display: none;
    }
  </style>
</head>

<body>

<h1>ONYRA</h1>
<div class="subtitle">Descubrí qué dicen tus sueños</div>

<textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

<div class="buttons">
  <button onclick="submitDream()">Interpretar sueño</button>
  <button class="secondary" onclick="clearAll()">Limpiar</button>
  <button id="shareBtn" class="secondary" onclick="shareDream()" disabled>Compartir</button>
  <button id="storyBtn" onclick="downloadStory()" disabled>Descargar story</button>
</div>

<div id="loading" class="loading" style="display:none;">
  Interpretando y generando imagen...
</div>

<div id="errorBox" class="error"></div>

<div id="result" class="card" style="display:none;">
  <img id="dreamImage"/>
  <div id="interpretation" class="interpretacion"></div>
</div>

<script>
const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";

let currentDream = {
  dream: "",
  interpretation: "",
  image: ""
};

async function submitDream() {
  const dream = document.getElementById("dreamInput").value.trim();

  if (!dream) return alert("Escribí un sueño");

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";
  document.getElementById("errorBox").style.display = "none";
  document.getElementById("shareBtn").disabled = true;
  document.getElementById("storyBtn").disabled = true;

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream })
    });

    const data = await res.json();

    if (!data.ok) throw new Error(data.error);

    currentDream = {
      dream,
      interpretation: data.interpretation,
      image: data.imageUrl
    };

    document.getElementById("dreamImage").src = data.imageUrl;
    document.getElementById("interpretation").innerText = data.interpretation;

    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("shareBtn").disabled = false;
    document.getElementById("storyBtn").disabled = false;

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("errorBox").style.display = "block";
    document.getElementById("errorBox").innerText = err.message || "Error";
  }
}

function shareDream() {
  const text = `Soñé: ${currentDream.dream}

Interpretación:
${currentDream.interpretation}

Viví tu sueño en ONYRA:
${window.location.href}`;

  if (navigator.share) {
    navigator.share({
      title: "Mi sueño en ONYRA",
      text,
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(text);
    alert("Copiado para compartir");
  }
}

function clearAll() {
  document.getElementById("dreamInput").value = "";
  document.getElementById("result").style.display = "none";
  document.getElementById("loading").style.display = "none";
  document.getElementById("errorBox").style.display = "none";
  document.getElementById("shareBtn").disabled = true;
  document.getElementById("storyBtn").disabled = true;

  currentDream = { dream:"", interpretation:"", image:"" };
}

function downloadStory() {
  if (!currentDream.image) return alert("Primero generá un sueño");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = currentDream.image;

  img.onload = () => {
    canvas.width = 1080;
    canvas.height = 1920;

    const bg = ctx.createLinearGradient(0,0,0,1920);
    bg.addColorStop(0,"#0a0a12");
    bg.addColorStop(1,"#1a1a2b");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,1080,1920);

    ctx.fillStyle="#fff";
    ctx.font="bold 70px Arial";
    ctx.textAlign="center";
    ctx.fillText("ONYRA",540,120);

    ctx.drawImage(img,140,260,800,700);

    ctx.font="36px Arial";
    wrapText(ctx,currentDream.interpretation,540,1100,800,50);

    canvas.toBlob(function(blob){
      const url=URL.createObjectURL(blob);

      const link=document.createElement("a");
      link.href=url;
      link.download="onyra.png";
      document.body.appendChild(link);

      const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);

      if(isIOS){
        window.open(url,"_blank");
      }else{
        link.click();
      }

      document.body.removeChild(link);
      setTimeout(()=>URL.revokeObjectURL(url),2000);

    },"image/png");
  };
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    if(ctx.measureText(testLine).width>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,y);
}
</script>

</body>
</html>
