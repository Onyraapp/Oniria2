<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONYRA - Descubrí tus sueños</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 30px;">

  <h1>ONYRA</h1>
  <p>Descubrí qué dicen tus sueños</p>

  <textarea id="dreamInput" placeholder="Contá tu sueño..." style="width: 300px; height: 100px;"></textarea>
  <br><br>

  <button onclick="submitDream()">Generar imagen</button>

  <p id="status"></p>

  <img id="resultImage" style="max-width: 300px; display: none; margin-top: 20px;" />

  <br><br>

  <button onclick="shareDream()">Compartir mi sueño</button>

<script>
const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev"; // CAMBIAR SI HACE FALTA

let currentDream = {
  text: "",
  image: ""
};

async function submitDream() {
  const dream = document.getElementById("dreamInput").value;

  if (!dream) {
    alert("Escribí un sueño primero");
    return;
  }

  document.getElementById("status").innerText = "Generando imagen...";

  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ dream })
    });

    const data = await response.json();

    if (!data.imageUrl) {
      throw new Error("No llegó imagen");
    }

    const img = document.getElementById("resultImage");
    img.src = data.imageUrl;
    img.style.display = "block";

    currentDream.text = dream;
    currentDream.image = data.imageUrl;

    document.getElementById("status").innerText = "Imagen lista";

  } catch (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error generando imagen";
  }
}

async function shareDream() {
  if (!currentDream.image) {
    alert("Primero generá una imagen");
    return;
  }

  const shareText = `Soñé esto: "${currentDream.text}"\n\nDescubrí el tuyo en ONYRA`;

  try {
    const response = await fetch(currentDream.image);
    const blob = await response.blob();

    const file = new File([blob], "sueno.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        text: shareText,
        files: [file]
      });
    } else {
      alert("Tu dispositivo no permite compartir imagen directamente");
    }

  } catch (err) {
    console.error(err);
    alert("Error al compartir");
  }
}
</script>

</body>
</html>
