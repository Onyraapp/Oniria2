<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0b0b12, #1a1a26);
  color: #fff;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 5px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

textarea {
  width: 90%;
  max-width: 500px;
  height: 100px;
  border-radius: 12px;
  padding: 12px;
  border: none;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  padding: 12px 22px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

.secondary {
  background: #2d2d3a;
}

.card {
  margin-top: 25px;
  padding: 18px;
  border-radius: 18px;
  background: #181822;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

img {
  width: 100%;
  max-width: 380px;
  max-height: 500px;
  object-fit: cover;
  border-radius: 16px;
  margin-top: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.interpretacion {
  margin-top: 15px;
  font-size: 15px;
  line-height: 1.6;
  text-align: left;
}

.loading {
  margin-top: 20px;
  opacity: 0.7;
}

</style>
</head>

<body>

<h1>ONYRA</h1>
<div class="subtitle">Descubrí qué dicen tus sueños</div>

<textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea><br>

<button onclick="submitDream()">Interpretar sueño</button>
<button class="secondary" onclick="clearAll()">Limpiar</button>

<div id="loading" class="loading" style="display:none;">
  Interpretando y generando imagen...
</div>

<div id="result" class="card" style="display:none;">
  <img id="dreamImage"/>
  <div id="interpretation" class="interpretacion"></div>
</div>

<div style="margin-top: 12px;">
  <button id="shareBtn" class="secondary" onclick="shareDream()" disabled>Compartir</button>
  <button onclick="downloadStory()">Descargar imagen</button>
</div>

<script>
const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";

let currentDream = {
  dream: "",
  interpretation: "",
  image: ""
};

async function submitDream() {
  const dream = document.getElementById("dreamInput").value.trim();

  if (!dream) {
    alert("Escribí un sueño primero");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream })
    });

    const data = await res.json();

    if (!data.ok) {
      console.error(data);
      alert("Error del worker");
      document.getElementById("loading").style.display = "none";
      return;
    }

    currentDream.dream = dream;
    currentDream.interpretation = data.interpretation;
    currentDream.image = data.imageUrl;

   document.getElementById("dreamImage").src = data.imageUrl;
document.getElementById("interpretation").innerText = data.interpretation;

document.getElementById("loading").style.display = "none";
document.getElementById("result").style.display = "block";
document.getElementById("shareBtn").disabled = false;
  } catch (err) {
    console.error(err);
    alert("Error de conexión");
    document.getElementById("loading").style.display = "none";
  }
}
function downloadStory() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = currentDream.image;

  img.onload = () => {
    canvas.width = 1080;
    canvas.height = 1920;

    // fondo negro
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // imagen sueño
    ctx.drawImage(img, 0, 200, 1080, 900);

    // titulo
    ctx.fillStyle = "#fff";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("ONYRA", 540, 120);

    // interpretación
    ctx.font = "40px Arial";

    const text = currentDream.interpretation;
    wrapText(ctx, text, 540, 1250, 900, 50);

    // link
    ctx.font = "28px Arial";
    ctx.fillStyle = "#aaa";
    ctx.fillText("onyra.app", 540, 1800);

    const link = document.createElement("a");
    link.download = "onyra-sueno.png";
    link.href = canvas.toDataURL();
    link.click();
  };
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";

  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + " ";
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;

    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + " ";
      y += lineHeight;
    } else {
      line = testLine;
    }
  }

  ctx.fillText(line, x, y);
}
function shareDream() {
  const text = `Soñé: ${currentDream.dream}

Interpretación:
${currentDream.interpretation}

Viví tu sueño en ONYRA:
${window.location.href}`;

  if (navigator.share) {
    navigator.share({
      title: "Mi sueño en ONYRA",
      text: text,
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(text);
    alert("Copiado para compartir");
  }
}

function clearAll() {
  document.getElementById("dreamInput").value = "";
  document.getElementById("result").style.display = "none";
  document.getElementById("shareBtn").disabled = true;
}
</script>

</body>
</html>
