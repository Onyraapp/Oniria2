<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
</head>
<body style="background:#111;color:#fff;font-family:Arial;padding:20px">

<h1>ONYRA</h1>

<textarea id="dream" placeholder="Escribí tu sueño..." style="width:100%;height:120px;"></textarea>

<br><br>

<select id="mode">
  <option value="intuitiva">Intuitiva</option>
  <option value="emocional">Emocional</option>
  <option value="psicoanalitica">Psicoanalítica</option>
</select>

<br><br>

<button onclick="interpret()">Interpretar</button>
<button onclick="image()">Imagen</button>

<h3>Resultado:</h3>
<pre id="result"></pre>

<img id="img" style="max-width:100%;margin-top:10px"/>

<script>

const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";

async function interpret() {
  const dream = document.getElementById("dream").value;
  const mode = document.getElementById("mode").value;

  const res = await fetch(WORKER_URL + "/interpret", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({dream, mode})
  });

  const data = await res.json();

  document.getElementById("result").textContent = data.interpretation;
}

async function image() {
  const dream = document.getElementById("dream").value;

  const res = await fetch(WORKER_URL + "/generate-image", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({dream})
  });

  const data = await res.json();

  document.getElementById("img").src = data.imageUrl;
}

</script>

</body>
</html>
