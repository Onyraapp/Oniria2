<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      background: #181a2f;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    p.subtitle {
      margin: 0 0 20px;
      color: #bfc3ff;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      background: #252844;
      color: white;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      margin: 6px;
    }

    .primary {
      background: #6c5ce7;
      color: white;
    }

    .secondary {
      background: #2d3157;
      color: white;
    }

    #status {
      margin-top: 14px;
      min-height: 22px;
      color: #d4d7ff;
      font-size: 14px;
    }

    #dreamImage {
      margin-top: 18px;
      width: 100%;
      border-radius: 14px;
      display: none;
    }

    .actions {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🌙 ONYRA</h1>
    <p class="subtitle">Contá tu sueño y convertílo en imagen</p>

    <textarea
      id="dreamInput"
      placeholder="Ejemplo: Soñé que volaba sobre el mar de noche..."
    ></textarea>

    <button class="primary" onclick="probarImagen()">Generar imagen</button>

    <div id="status"></div>

    <img id="dreamImage" alt="Imagen generada del sueño" />

    <div class="actions" id="actions">
      <button class="secondary" onclick="descargarImagen()">Descargar</button>
      <button class="secondary" onclick="compartirImagen()">Compartir</button>
    </div>
  </div>

  <script>
    async function generateAIImage(dreamText) {
      const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ dream: dreamText })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Error generando imagen");
      }

      if (!data.imageUrl) {
        throw new Error("No llegó la imagen");
      }

      return data.imageUrl;
    }

    async function probarImagen() {
      const dream = document.getElementById("dreamInput").value.trim();
      const status = document.getElementById("status");
      const img = document.getElementById("dreamImage");
      const actions = document.getElementById("actions");

      if (!dream) {
        status.textContent = "Escribí un sueño primero.";
        return;
      }

      try {
        status.textContent = "Generando imagen...";
        img.style.display = "none";
        actions.style.display = "none";

        const imageUrl = await generateAIImage(dream);

        img.src = imageUrl;
        img.style.display = "block";
        actions.style.display = "block";
        status.textContent = "Imagen generada ✨";
      } catch (error) {
        console.error(error);
        status.textContent = "Error: " + error.message;
      }
    }

    function descargarImagen() {
      const img = document.getElementById("dreamImage");

      if (!img.src) {
        return;
      }

      const link = document.createElement("a");
      link.href = img.src;
      link.download = "onyra-sueno.png";
      link.click();
    }

    async function compartirImagen() {
      const img = document.getElementById("dreamImage");

      if (!img.src) {
        return;
      }

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: "Mirá la imagen que generé con ONYRA",
            url: img.src
          });
        } catch (error) {
          console.log("Compartir cancelado o no disponible", error);
        }
      } else {
        alert("Tu navegador no soporta compartir directo.");
      }
    }
  </script>
</body>
</html>
