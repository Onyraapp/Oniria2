<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#0b0b12,#1a1a26);
  color:#fff;
  text-align:center;
  padding:20px;
}

h1 {
  font-family:'Playfair Display',serif;
  font-size:36px;
  margin-bottom:5px;
}

.subtitle {
  opacity:0.7;
  margin-bottom:20px;
}

textarea {
  width:90%;
  max-width:520px;
  height:110px;
  border-radius:12px;
  padding:12px;
  border:none;
  margin-bottom:20px;
}

.main-btn {
  background:#6c5ce7;
  font-size:16px;
  padding:14px 28px;
  border-radius:12px;
}

.secondary-btn {
  background:#2d2d3a;
}

button {
  border:none;
  color:#fff;
  margin:6px;
  cursor:pointer;
}

.card {
  margin-top:24px;
  padding:20px;
  border-radius:18px;
  background:#181822;
  max-width:560px;
  margin-left:auto;
  margin-right:auto;
  position:relative;
}

img {
  width:100%;
  max-width:380px;
  border-radius:16px;
  margin-top:10px;
}

.interpretacion {
  margin-top:16px;
  text-align:left;
  line-height:1.6;
}

.clear-btn {
  position:absolute;
  top:10px;
  right:10px;
  width:30px;
  height:30px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

.loading { margin-top:20px; }
.error { color:#ffb3b3; display:none; }
</style>
</head>

<body>

<h1>ONYRA</h1>
<div class="subtitle">Descubrí qué dicen tus sueños</div>

<textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

<br>

<button class="main-btn" onclick="submitDream()">Interpretar</button>

<br>

<button id="shareBtn" class="secondary-btn" onclick="shareDream()" disabled>Compartir</button>
<button id="storyBtn" class="secondary-btn" onclick="downloadStory()" disabled>Compartir imagen</button>

<div id="loading" class="loading" style="display:none;">Generando...</div>
<div id="errorBox" class="error"></div>

<div id="result" class="card" style="display:none;">
  <button onclick="clearAll()" class="clear-btn">✕</button>
  <img id="dreamImage">
  <div id="interpretation" class="interpretacion"></div>
</div>

<script>

const WORKER_URL="https://onyra-final-ok.almacenmujica.workers.dev";
const LOGO_URL="og-image.svg";

let currentDream={};

async function submitDream(){
  const dream=dreamInput.value.trim();
  if(!dream) return alert("Escribí un sueño");

  loading.style.display="block";
  result.style.display="none";
  errorBox.style.display="none";
  shareBtn.disabled=true;
  storyBtn.disabled=true;

  try{
    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({dream})
    });

    const data=await res.json();
    if(!data.ok) throw new Error(data.error);

    currentDream=data;
    currentDream.dream=dream;

    dreamImage.src=data.imageUrl;
    interpretation.innerText=data.interpretation;

    loading.style.display="none";
    result.style.display="block";
    shareBtn.disabled=false;
    storyBtn.disabled=false;

  }catch(e){
    loading.style.display="none";
    errorBox.style.display="block";
    errorBox.innerText=e.message;
  }
}

function shareDream(){
  const text=`Soñé: ${currentDream.dream}

${currentDream.interpretation}

${location.href}`;

  navigator.share ? navigator.share({text}) : navigator.clipboard.writeText(text);
}

function clearAll(){
  dreamInput.value="";
  result.style.display="none";
  shareBtn.disabled=true;
  storyBtn.disabled=true;
}

function downloadStory(){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  const img=new Image();
  const logo=new Image();

  img.src=currentDream.imageUrl;
  logo.src=LOGO_URL;

  let ready=0;

  function draw(){
    if(ready<1) return;

    canvas.width=1080;
    canvas.height=1920;

    const bg=ctx.createLinearGradient(0,0,0,1920);
    bg.addColorStop(0,"#0a0a12");
    bg.addColorStop(1,"#1a1a2b");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,1080,1920);

    if(logo.complete){
      ctx.shadowColor="rgba(108,92,231,0.6)";
      ctx.shadowBlur=30;
      drawLogo(ctx,logo);
      ctx.shadowBlur=0;
    }

    ctx.drawImage(img,140,260,800,700);

    const g=ctx.createLinearGradient(0,260,0,960);
    g.addColorStop(0,"rgba(0,0,0,0)");
    g.addColorStop(1,"rgba(0,0,0,0.6)");
    ctx.fillStyle=g;
    ctx.fillRect(140,260,800,700);

    ctx.fillStyle="#fff";
    ctx.font="bold 60px Playfair Display";
    ctx.textAlign="center";
    ctx.fillText("Tu sueño",540,1080);

    ctx.font="36px Inter";
    wrap(ctx,currentDream.interpretation,540,1200,800,50);

    ctx.font="26px Inter";
    ctx.fillStyle="rgba(255,255,255,0.4)";
    ctx.fillText("onyra.app",540,1820);

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download="onyra.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  }

  img.onload=()=>{ready++;draw();}
  logo.onload=()=>{draw();}

}

function drawLogo(ctx,img){
  const w=400,h=140,x=340,y=40;
  const r=img.width/img.height;
  let dw=w,dh=w/r;
  if(dh>h){dh=h;dw=h*r;}
  ctx.drawImage(img,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
}

function wrap(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+" ";
    if(ctx.measureText(test).width>maxWidth){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else line=test;
  }
  ctx.fillText(line,x,y);
}

</script>

</body>
</html>
