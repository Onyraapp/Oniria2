<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b12;
  color:white;
}

.screen { display:none; padding:20px; }
.screen.active { display:block; }

button {
  padding:12px;
  margin-top:10px;
  width:100%;
  background:#7C5CFF;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

textarea {
  width:100%;
  height:150px;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

.card {
  background:#1a1a2e;
  padding:15px;
  border-radius:12px;
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<!-- HOME -->

<div class="screen active" id="s-home">
  <h1>ONYRA</h1>
  <p>¿Qué soñaste anoche?</p>
  <button onclick="go('compose')">Contar mi sueño</button>
  <button onclick="showHistory()">Ver historial</button>
  <button onclick="resetDemo()">Reset demo</button>
</div>

<!-- COMPOSE -->

<div class="screen" id="s-compose">
  <h2>Contá tu sueño</h2>
  <textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>
  <button onclick="submitDream()">Interpretar</button>
  <button onclick="go('home')">Volver</button>
</div>
<div class="screen" id="s-history">
  <h2>Historial de sueños</h2>

  <div id="historyList"></div>

  <button onclick="go('home')">Volver</button>
</div>
<!-- RESULT -->

<!-- RESULT -->

<div class="screen" id="s-result">
  <div class="card">

    <img id="dreamImage" style="width:100%; border-radius:16px; margin-bottom:15px;" />

    <div id="imageLoading" style="display:none; color:#aaa;">
      Generando imagen...
      <button onclick="shareDream()">Compartir mi sueño</button>
    </div>

    <h3 id="resultTitle"></h3>
    <p id="resultText"></p>

  </div>
</div>

<script>

function go(s){
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.getElementById('s-' + s).classList.add('active');
}

function buildInterpretation(text){
  const t = text.toLowerCase();

  if(t.includes('persegu')){
    return {
      title: "La persecución silenciosa",
      interpretation: "Hay algo que estás evitando enfrentar."
    };
  }

  if(t.includes('volar')){
    return {
      title: "El impulso de escapar",
      interpretation: "Buscás libertad o salir de una situación."
    };
  }

  return {
    title: "Un sueño en movimiento",
    interpretation: "Tu mente está procesando emociones internas."
  };
}

async function generateDreamImage(text){
  const response = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ dream: text })
  });

  const data = await response.json();
  console.log("worker response:", data);

  if(!response.ok){
    throw new Error(JSON.stringify(data));
  }

  if(!data.imageUrl){
    throw new Error("No llegó imageUrl. Respuesta: " + JSON.stringify(data));
  }

  return data.imageUrl;
}
  function resetDemo(){
  localStorage.removeItem('used');
  localStorage.removeItem('day');
  alert("Reset listo");
}
async function submitDream(){
  const text = document.getElementById('dreamInput').value.trim();

  if(!text){
    alert("Escribí un sueño");
    return;
  }

  const result = buildInterpretation(text);

  currentDream = {
    text,
    title: result.title,
    quote: result.quote,
    interpretation: result.interpretation,
    image: ""
  };

  document.getElementById('resultTitle').innerText = result.title;
  document.getElementById('resultText').innerText = result.interpretation;

  const img = document.getElementById("dreamImage");
  const loading = document.getElementById("imageLoading");

  img.src = "";
  if (loading) loading.style.display = "block";

  go('result');

  try {
    const imageUrl = await generateDreamImage(text);

    img.src = imageUrl;
    currentDream.image = imageUrl;

    saveCurrentDream();

  } catch(e) {
    console.error("error imagen:", e);
    document.getElementById('resultText').innerText += " (La imagen IA no pudo generarse en este momento. Se mantiene la interpretación.)";
  } finally {
    if (loading) loading.style.display = "none";
  }
}
function showHistory(){
  const container = document.getElementById("historyList");
  container.innerHTML = "";

  const dreams = JSON.parse(localStorage.getItem("dreams") || "[]");

  if(dreams.length === 0){
    container.innerHTML = "<p>No hay sueños guardados</p>";
    go("history");
    return;
  }

  dreams.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";
    div.style.marginBottom = "15px";

    div.innerHTML = `
      ${d.image ? `<img src="${d.image}" style="width:100%; border-radius:10px; margin-bottom:10px;" />` : ""}
      <h3>${d.title}</h3>
      <p>${d.interpretation}</p>
    `;

    container.appendChild(div);
  });

  go("history");
}
</script>

</body>
</html>
