<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: white;
      margin: 0;
      padding: 24px;
      text-align: center;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      opacity: 0.9;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border-radius: 14px;
      border: 1px solid #444;
      padding: 14px;
      font-size: 16px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
      background: #191b33;
      color: white;
    }

    button {
      margin-top: 14px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 6px;
      margin-left: 6px;
    }

    .primary {
      background: #7c5cff;
      color: white;
    }

    .secondary {
      background: #ffffff;
      color: #111;
    }

    .tertiary {
      background: #27c27a;
      color: white;
    }

    .quaternary {
      background: #ffb020;
      color: #111;
    }

    #status {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      opacity: 0.9;
    }

    #previewWrap {
      margin-top: 20px;
      display: none;
    }

    #resultImage {
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }

    .actions {
      margin-top: 12px;
    }

    .small {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 12px;
    }

    .gallerySection {
      margin-top: 40px;
      text-align: left;
    }

    .galleryHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .galleryGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #17192d;
      border: 1px solid #2e3258;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .cardContent {
      padding: 12px;
    }

    .cardDream {
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 8px;
      color: #f2f2f2;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cardDate {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .cardActions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cardActions button {
      margin: 0;
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 10px;
    }

    .emptyGallery {
      opacity: 0.7;
      font-size: 14px;
      background: #17192d;
      border: 1px dashed #39406e;
      border-radius: 14px;
      padding: 18px;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      button {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }

      .galleryHeader {
        align-items: stretch;
      }

      .galleryHeader button {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>ONYRA</h1>
    <p>Descubrí qué dicen tus sueños</p>

    <textarea
      id="dreamInput"
      placeholder="Escribí tu sueño..."
    ></textarea>

    <div class="actions">
      <button class="primary" onclick="submitDream()">Generar imagen</button>
      <button class="secondary" onclick="shareDream()">Compartir</button>
      <button class="tertiary" onclick="saveDreamImage()">Guardar imagen</button>
      <button class="quaternary" onclick="saveToGallery()">Guardar en mi galería</button>
    </div>

    <div id="status"></div>

    <div id="previewWrap">
      <img id="resultImage" alt="Imagen del sueño" />
      <div class="small">Tu sueño interpretado visualmente</div>
    </div>

    <div class="gallerySection">
      <div class="galleryHeader">
        <h2 style="margin:0;">Mi galería de sueños</h2>
        <button class="secondary" onclick="clearGallery()">Borrar galería</button>
      </div>
      <div id="gallery"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";
    const APP_LINK = "https://tu-dominio.com";
    const STORAGE_KEY = "onyra_gallery_v1";

    const currentDream = {
      text: "",
      imageUrl: ""
    };

    document.addEventListener("DOMContentLoaded", () => {
      renderGallery();
    });

    async function submitDream() {
      const dreamInput = document.getElementById("dreamInput");
      const status = document.getElementById("status");
      const resultImage = document.getElementById("resultImage");
      const previewWrap = document.getElementById("previewWrap");

      const dream = dreamInput.value.trim();

      if (!dream) {
        alert("Escribí un sueño primero");
        return;
      }

      status.innerText = "Generando imagen...";
      previewWrap.style.display = "none";
      resultImage.removeAttribute("src");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ dream })
        });

        const data = await res.json();

        if (!res.ok || !data.ok || !data.imageUrl) {
          console.error("Respuesta worker:", data);
          throw new Error(data?.error || "No se pudo generar la imagen");
        }

        resultImage.src = data.imageUrl;
        previewWrap.style.display = "block";

        currentDream.text = dream;
        currentDream.imageUrl = data.imageUrl;

        status.innerText = "Imagen lista";
      } catch (error) {
        console.error("Error final:", error);
        status.innerText = "Error generando imagen";
      }
    }

    async function shareDream() {
      if (!currentDream.imageUrl) {
        alert("Primero generá una imagen");
        return;
      }

      const shareText =
        `Soñé esto: "${currentDream.text}"\n\n` +
        `Descubrí el tuyo en ONYRA:\n${APP_LINK}`;

      try {
        const imageResponse = await fetch(currentDream.imageUrl);
        const imageBlob = await imageResponse.blob();
        const imageFile = new File([imageBlob], "onyra-sueno.png", {
          type: "image/png"
        });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [imageFile] })) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: shareText,
            files: [imageFile]
          });
          return;
        }

        if (navigator.share) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: shareText,
            url: APP_LINK
          });
          return;
        }

        await navigator.clipboard.writeText(shareText);
        alert("Tu dispositivo no soporta compartir archivos. Copié el texto al portapapeles.");
      } catch (err) {
        console.error("Error al compartir:", err);
        alert("Error al compartir");
      }
    }

    function saveDreamImage() {
      if (!currentDream.imageUrl) {
        alert("Primero generá una imagen");
        return;
      }

      const link = document.createElement("a");
      link.href = currentDream.imageUrl;
      link.download = "onyra-sueno.png";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function saveToGallery() {
      if (!currentDream.imageUrl || !currentDream.text) {
        alert("Primero generá una imagen");
        return;
      }

      const gallery = getGallery();

      gallery.unshift({
        id: Date.now(),
        text: currentDream.text,
        imageUrl: currentDream.imageUrl,
        createdAt: new Date().toISOString()
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(gallery));
      renderGallery();

      document.getElementById("status").innerText = "Sueño guardado en tu galería";
    }

    function getGallery() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error("Error leyendo galería:", e);
        return [];
      }
    }

    function renderGallery() {
      const galleryEl = document.getElementById("gallery");
      const gallery = getGallery();

      if (!gallery.length) {
        galleryEl.innerHTML = `
          <div class="emptyGallery">
            Todavía no guardaste sueños en tu galería.
          </div>
        `;
        return;
      }

      galleryEl.innerHTML = `
        <div class="galleryGrid">
          ${gallery.map(item => `
            <div class="card">
              <img src="${item.imageUrl}" alt="Sueño guardado" />
              <div class="cardContent">
                <div class="cardDream">${escapeHtml(item.text)}</div>
                <div class="cardDate">${formatDate(item.createdAt)}</div>
                <div class="cardActions">
                  <button class="secondary" onclick="downloadGalleryItem(${item.id})">Descargar</button>
                  <button class="quaternary" onclick="reuseDream(${item.id})">Reusar texto</button>
                  <button class="primary" onclick="deleteGalleryItem(${item.id})">Eliminar</button>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function deleteGalleryItem(id) {
      const gallery = getGallery().filter(item => item.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(gallery));
      renderGallery();
    }

    function clearGallery() {
      const ok = confirm("¿Querés borrar toda tu galería?");
      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);
      renderGallery();
    }

    function reuseDream(id) {
      const item = getGallery().find(x => x.id === id);
      if (!item) return;

      document.getElementById("dreamInput").value = item.text;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function downloadGalleryItem(id) {
      const item = getGallery().find(x => x.id === id);
      if (!item) return;

      const link = document.createElement("a");
      link.href = item.imageUrl;
      link.download = `onyra-sueno-${id}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function formatDate(isoString) {
      try {
        return new Date(isoString).toLocaleString("es-AR", {
          dateStyle: "short",
          timeStyle: "short"
        });
      } catch (e) {
        return isoString;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
