<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b12;
  color:white;
}

.screen {
  display:none;
  min-height:100vh;
}

.screen.active {
  display:block;
}

/* botones */
button {
  padding:12px 20px;
  border-radius:10px;
  border:none;
  background:#7C5CFF;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* splash */
#s-splash {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

/* simple layout */
.container {
  padding:24px;
  text-align:center;
}

textarea {
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div class="screen active" id="s-splash">
  ONYRA
</div>

<!-- ONBOARDING -->
<div class="screen" id="s-onboard">
  <div class="container">
    <h2>Tus sueños tienen significado</h2>
    <p>Descubrí lo que tu mente intenta decirte</p>
    <button onclick="finishOnboarding()">Empezar</button>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="s-home">
  <div class="container">
    <h1>ONYRA</h1>
    <p>¿Qué soñaste anoche?</p>

    <button onclick="go('compose')">
      Contar mi sueño
    </button>

    <div style="margin-top:20px;">
      <button onclick="go('history')">Historial</button>
    </div>
  </div>
</div>

<!-- COMPOSE -->
<div class="screen" id="s-compose">
  <div class="container">
    <h2>Contá tu sueño</h2>

    <textarea id="dreamInput"
      placeholder="Contá tu sueño como si se lo contaras a alguien...">
    </textarea>

    <br><br>

    <button onclick="submitDream()">
      Interpretar
    </button>

    <br><br>

    <button onclick="go('home')">Volver</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="container">
    <h2 id="resultTitle">Resultado</h2>

    <p id="resultText"></p>

    <button onclick="go('compose')">
      Explorar otro sueño
    </button>

    <br><br>

    <button onclick="go('home')">
      Volver al inicio
    </button>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="s-history">
  <div class="container">
    <h2>Historial</h2>
    <div id="historyList"></div>

    <br>
    <button onclick="go('home')">Volver</button>
  </div>
</div>

<script>

/* NAV */
function go(s){
  document.querySelectorAll('.screen').forEach(el=>{
    el.classList.remove('active');
  });

  const target = document.getElementById('s-' + s);

  if(!target){
    document.body.innerHTML = "Error: pantalla no encontrada " + s;
    return;
  }

  target.classList.add('active');
}

/* ONBOARDING */
function finishOnboarding(){
  localStorage.setItem('onyra_onboarded', '1');
  go('home');
}

/* SPLASH FLOW */
setTimeout(()=>{
  go('home');
},2000);

/* DREAM */
function submitDream(){
  const text = document.getElementById('dreamInput').value;

  if(!text){
    alert("Escribí un sueño");
    return;
  }

  const interpretation =
    "Este sueño puede estar relacionado con emociones internas que tu mente está procesando.";

  document.getElementById('resultTitle').innerText = "Interpretación";
  document.getElementById('resultText').innerText = interpretation;

  saveDream(text, interpretation);

  go('result');
}

/* STORAGE */
function saveDream(text, interpretation){
  let dreams = JSON.parse(localStorage.getItem('dreams') || '[]');

  dreams.push({
    text,
    interpretation,
    date: new Date().toLocaleString()
  });

  localStorage.setItem('dreams', JSON.stringify(dreams));
}

/* HISTORY */
function renderHistory(){
  const container = document.getElementById('historyList');
  const dreams = JSON.parse(localStorage.getItem('dreams') || '[]');

  container.innerHTML = "";

  dreams.reverse().forEach(d=>{
    const div = document.createElement('div');
    div.style.marginBottom = "15px";
    div.innerHTML = `<b>${d.date}</b><br>${d.text}`;
    container.appendChild(div);
  });
}

/* HOOK HISTORY */
document.getElementById('s-history').addEventListener('click', renderHistory);

</script>

</body>
</html>
