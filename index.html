<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body{
background:#0a0a0f;
color:white;
font-family:Arial;
margin:0;
padding:20px;
max-width:600px;
margin:auto;
}

h1{
text-align:center;
letter-spacing:4px;
color:#d9b26f;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
background:#111;
color:white;
border:1px solid #333;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
background:#d9b26f;
cursor:pointer;
}

#result img{
width:100%;
margin-top:15px;
border-radius:10px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:6px;
margin-top:10px;
}

.history-item{
display:flex;
gap:10px;
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.thumb{
width:60px;
height:60px;
border-radius:10px;
object-fit:cover;
}
</style>
</head>

<body>

<h1>ONYRA</h1>

<textarea id="dream" placeholder="Contá tu sueño..."></textarea>

<button onclick="go()">INTERPRETAR</button>

<div id="result"></div>

<div class="actions">
<button onclick="save()">Guardar</button>
<button onclick="share()">Compartir</button>
<button onclick="toggleHistory()">Historial</button>
</div>

<div id="historyBox" style="display:none;">
<h3>Historial</h3>
<div id="history"></div>
</div>

<canvas id="c" width="1080" height="1920" style="display:none"></canvas>

<script>

const WORKER_URL="https://onyra-final-ok.almacenmujica.workers.dev";

let current={};

// 🔥 INTERPRETAR
async function go(){

const dream=document.getElementById("dream").value;
const result=document.getElementById("result");

result.innerHTML=`
<div style="padding:20px;text-align:center;color:#d9b26f;font-weight:bold;">
Interpretando el sueño...
</div>
`;

try{

const res=await fetch(WORKER_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({dream})
});

const data=await res.json();

if(!data.ok){
result.innerHTML=`<pre>${JSON.stringify(data,null,2)}</pre>`;
return;
}

current=data;

result.innerHTML=`
${data.imageUrl?`<img src="${data.imageUrl}">`:""}
<p>${data.interpretation}</p>
`;

}catch(err){
result.innerHTML=`<pre>${err}</pre>`;
}

}

// 💾 GUARDAR
function save(){

if(!current.dream && !current.interpretation){
alert("Primero interpretá un sueño");
return;
}

let h=JSON.parse(localStorage.getItem("h")||"[]");

h.unshift({
dream:current.dream,
interpretation:current.interpretation,
imageUrl:current.imageUrl||""
});

localStorage.setItem("h",JSON.stringify(h));

render();

}

// 📂 HISTORIAL TOGGLE
function toggleHistory(){
const box=document.getElementById("historyBox");
box.style.display = box.style.display==="none"?"block":"none";
}

// 🧠 HISTORIAL
function render(){

let h=JSON.parse(localStorage.getItem("h")||"[]");

if(!h.length){
document.getElementById("history").innerHTML="No hay sueños guardados";
return;
}

document.getElementById("history").innerHTML=
h.map(x=>`
<div class="history-item" onclick="load('${x.dream.replace(/'/g,"")}')">
<img class="thumb" src="${x.imageUrl||''}">
<div>${x.dream?.slice(0,60)}</div>
</div>
`).join("");

}

// 🔁 CARGAR
function load(d){
document.getElementById("dream").value=d;
}

// 📤 SHARE
async function share(){

if(!current.interpretation) return;

try{

const dataUrl=await buildStory();

const file=await (await fetch(dataUrl)).blob();

if(navigator.share){
await navigator.share({
files:[new File([file],"onyra.png",{type:"image/png"})]
});
}else{
download(dataUrl);
}

}catch(e){
download(await buildStory());
}

}

// 📱 STORY
async function buildStory(){

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

ctx.fillStyle="#000";
ctx.fillRect(0,0,1080,1920);

if(current.imageUrl){
const img=new Image();
img.src=current.imageUrl;

await new Promise(r=>img.onload=r);

ctx.drawImage(img,0,0,1080,800);
}

ctx.fillStyle="white";
ctx.font="bold 60px Arial";
ctx.fillText("ONYRA",80,900);

ctx.font="40px Arial";
wrap(ctx,current.interpretation,80,1000,900,50);

return canvas.toDataURL();

}

// 🧩 WRAP TEXT
function wrap(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
let yy=y;

for(let n=0;n<words.length;n++){
let test=line+words[n]+" ";
let w=ctx.measureText(test).width;
if(w>maxWidth && n>0){
ctx.fillText(line,x,yy);
line=words[n]+" ";
yy+=lineHeight;
}else{
line=test;
}
}
ctx.fillText(line,x,yy);
}

// ⬇️ DOWNLOAD
function download(url){
const a=document.createElement("a");
a.href=url;
a.download="onyra.png";
a.click();
}

render();

</script>

</body>
</html>
