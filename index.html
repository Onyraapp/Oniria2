<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f1020;
  color: white;
  text-align: center;
  padding: 20px;
}
textarea, select {
  width: 90%;
  max-width: 400px;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}
button {
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
}
img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>🌙 ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

<select id="style">
  <option value="oscuro">Oscuro</option>
  <option value="cine">Cine</option>
  <option value="surreal">Surreal</option>
</select><br>

<button onclick="generar()">Generar</button>

<p id="status"></p>
<img id="img">

<script>
const WORKER = "https://onyra-final-ok.almacenmujica.workers.dev";

function dataUrlToBlobUrl(dataUrl) {
  const parts = dataUrl.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const binary = atob(parts[1]);
  const len = binary.length;
  const bytes = new Uint8Array(len);

  for (let i = 0; i < len; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  const blob = new Blob([bytes], { type: mime });
  return URL.createObjectURL(blob);
}

async function generar() {
  const dream = document.getElementById("dreamInput").value.trim();
  const style = document.getElementById("style").value;
  const status = document.getElementById("status");
  const img = document.getElementById("img");

  if (!dream) {
    status.innerText = "Escribí un sueño primero";
    return;
  }

  try {
    status.innerText = "Generando...";

    const res = await fetch(WORKER, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ dream, style })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Error generando imagen");
    }

    const blobUrl = dataUrlToBlobUrl(data.imageUrl);
    img.src = blobUrl;

    status.innerText = "✨ Listo";
  } catch (e) {
    console.error(e);
    status.innerText = "Error: " + e.message;
  }
}
</script>

</body>
</html>
