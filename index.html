<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#090910,#1a1a27);
  color:#fff;
  text-align:center;
  padding:28px 18px 40px;
}

.shell { max-width:620px; margin:auto; }

h1 {
  font-family:'Playfair Display';
  font-size:42px;
  margin:0;
}

.subtitle {
  color:rgba(255,255,255,0.7);
  margin-top:10px;
}

.panel {
  margin-top:28px;
  background:rgba(255,255,255,0.05);
  border-radius:24px;
  padding:22px;
}

textarea {
  width:100%;
  min-height:120px;
  border-radius:16px;
  padding:14px;
  border:none;
  background:#111;
  color:#fff;
}

.main-btn {
  margin-top:16px;
  padding:16px;
  width:100%;
  max-width:320px;
  border:none;
  border-radius:16px;
  background:#6c5ce7;
  color:#fff;
  cursor:pointer;
}

.result-actions {
  display:none;
  margin-top:16px;
  gap:10px;
  grid-template-columns:repeat(3,1fr);
}

.result-actions.show { display:grid; }

.secondary-btn {
  padding:12px;
  border-radius:12px;
  border:none;
  background:#2d2d3a;
  color:#fff;
  cursor:pointer;
}

.result-card {
  display:none;
  margin-top:24px;
  background:#181822;
  border-radius:24px;
  padding:16px;
  position:relative;
}

.result-card.show { display:block; }

.clear-btn {
  position:absolute;
  top:10px;
  right:10px;
}

img {
  width:100%;
  border-radius:16px;
}

.interpretacion {
  margin-top:12px;
  text-align:left;
}

.history-box { margin-top:20px; display:none; }

.history-card {
  margin-bottom:12px;
  background:#222;
  border-radius:14px;
  padding:10px;
}

.history-row {
  display:flex;
  gap:10px;
}

.history-thumb {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

@media(max-width:520px){
  .result-actions { grid-template-columns:1fr; }
}
</style>
</head>

<body>
<div class="shell">

<h1>ONYRA</h1>
<div class="subtitle">Descubrí qué dicen tus sueños</div>

<div class="panel">

<textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

<button class="main-btn" onclick="submitDream()">Interpretar</button>

<div id="resultActions" class="result-actions">
  <button id="saveBtn" class="secondary-btn" onclick="saveDream()" disabled>Guardar</button>
  <button id="storyBtn" class="secondary-btn" onclick="shareDream()" disabled>Compartir sueño</button>
  <button class="secondary-btn" onclick="toggleHistory()">Historial</button>
</div>

<div id="historyBox" class="history-box"></div>

</div>

<div id="result" class="result-card">
<button class="clear-btn" onclick="clearAll()">✕</button>
<img id="dreamImage">
<div id="interpretation" class="interpretacion"></div>
</div>

</div>

<script>
const WORKER_URL="https://onyra-final-ok.almacenmujica.workers.dev";
let currentDream={};

async function submitDream(){
  const dream=dreamInput.value.trim();
  if(!dream)return alert("Escribí un sueño");

  const res=await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({dream})
  });

  const data=await res.json();

  currentDream={dream,...data};

  dreamImage.src=data.imageUrl;
  interpretation.innerText=data.interpretation;

  result.classList.add("show");
  resultActions.classList.add("show");

  saveBtn.disabled=false;
  storyBtn.disabled=false;
}

function saveDream(){
  const stored=JSON.parse(localStorage.getItem("onyraDreams")||"[]");

  stored.unshift({...currentDream,date:new Date()});

  localStorage.setItem("onyraDreams",JSON.stringify(stored));
  alert("Guardado");
}

function toggleHistory(){
  if(historyBox.style.display==="block"){
    historyBox.style.display="none";
    return;
  }

  const data=JSON.parse(localStorage.getItem("onyraDreams")||"[]");

  historyBox.innerHTML=data.map((d,i)=>`
    <div class="history-card" onclick="loadDream(${i})">
      <div class="history-row">
        <img src="${d.imageUrl}" class="history-thumb">
        <div>
          <div>${d.dream}</div>
          <div style="font-size:12px;opacity:0.6">${d.interpretation.slice(0,80)}...</div>
        </div>
      </div>
    </div>
  `).join("");

  historyBox.style.display="block";
}

function loadDream(i){
  const data=JSON.parse(localStorage.getItem("onyraDreams")||"[]");
  const d=data[i];

  currentDream=d;

  dreamInput.value=d.dream;
  dreamImage.src=d.imageUrl;
  interpretation.innerText=d.interpretation;

  result.classList.add("show");
  resultActions.classList.add("show");

  historyBox.style.display="none";
}

function clearAll(){
  dreamInput.value="";
  result.classList.remove("show");
  resultActions.classList.remove("show");
}

async function shareDream(){
  const blob=await buildImage();

  const file=new File([blob],"onyra.png",{type:"image/png"});

  const text=`Soñé: ${currentDream.dream}

${currentDream.interpretation}`;

  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],text});
  }else{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="onyra.png";
    a.click();
    navigator.clipboard.writeText(text);
  }
}

function buildImage(){
  return new Promise(resolve=>{
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    const img=new Image();
    img.src=currentDream.imageUrl;

    img.onload=()=>{
      canvas.width=1080;
      canvas.height=1920;

      ctx.fillStyle="#111";
      ctx.fillRect(0,0,1080,1920);

      ctx.drawImage(img,140,260,800,700);

      ctx.fillStyle="#fff";
      ctx.font="40px Arial";
      ctx.fillText("Tu sueño",540,1100);

      resolve(canvasToBlob(canvas));
    };
  });
}

function canvasToBlob(canvas){
  return new Promise(r=>canvas.toBlob(r));
}
</script>

</body>
</html>
