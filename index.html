<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #26212d 0%, #15121a 35%, #09090c 100%);
      color: #f4efe7;
      min-height: 100vh;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #c9c0b5;
      font-size: 15px;
      line-height: 1.5;
      max-width: 560px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 35px rgba(0,0,0,.28);
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    textarea::placeholder {
      color: #b8aea0;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    option {
      color: #111;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .primary {
      background: linear-gradient(135deg, #f2dfb2, #d7b878);
      color: #111;
      font-weight: 800;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result-card {
      overflow: hidden;
      padding: 0;
    }

    .image-wrap {
      width: 100%;
      min-height: 260px;
      background: linear-gradient(180deg, #17141d, #0f0d13);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .image-wrap img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 500px;
    }

    .image-placeholder {
      color: #bfb4a5;
      padding: 36px 20px;
      text-align: center;
      font-size: 14px;
    }

    .result-body {
      padding: 22px;
    }

    .mode-badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: #111;
      background: #f1dfb6;
      padding: 7px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .dream-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b9b0a5;
      margin-bottom: 8px;
    }

    .dream-preview {
      color: #f0ebe2;
      font-size: 17px;
      line-height: 1.6;
      margin-bottom: 22px;
      white-space: pre-wrap;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b9b0a5;
      margin-bottom: 10px;
    }

    .interpretation {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 16px;
      color: #f4efe7;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .status {
      font-size: 14px;
      color: #d3cabd;
      margin-top: 10px;
      min-height: 18px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .history-title {
      margin: 0;
      font-size: 18px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      transition: background .15s ease, transform .15s ease;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 6px;
    }

    .history-dream {
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }

    .history-mode {
      font-size: 11px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(241,223,182,0.15);
      color: #f1dfb6;
      white-space: nowrap;
      border: 1px solid rgba(241,223,182,0.2);
    }

    .history-date {
      color: #bdb4a8;
      font-size: 12px;
      margin-top: 4px;
    }

    .mini {
      font-size: 13px;
      color: #c8bfb3;
      margin-top: 8px;
      line-height: 1.5;
    }

    .clear-btn {
      background: transparent;
      color: #d8c8a0;
      border: 1px solid rgba(216,200,160,0.2);
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .buttons {
        grid-template-columns: 1fr;
      }

      .logo {
        font-size: 35px;
      }

      .history-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="logo">ONYRA</div>
      <div class="subtitle">
        Descubrí posibles sentidos detrás de tus sueños con una lectura visual, emocional o psicoanalítica.
      </div>
    </div>

    <div class="panel">
      <textarea id="dreamInput" placeholder="Escribí lo que soñaste..."></textarea>

      <div class="controls">
        <select id="modeSelect">
          <option value="intuitiva">Modo Intuitiva</option>
          <option value="emocional">Modo Emocional</option>
          <option value="psicoanalitica">Modo Psicoanalítica</option>
        </select>

        <div class="buttons">
          <button class="primary" id="interpretBtn" onclick="submitDream()">Interpretar sueño</button>
          <button class="secondary" id="imageBtn" onclick="generateImage()">Generar imagen</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="panel result-card" id="resultCard" style="display:none;">
      <div class="image-wrap" id="imageWrap">
        <div class="image-placeholder">Todavía no generaste una imagen para este sueño.</div>
      </div>

      <div class="result-body">
        <div class="mode-badge" id="modeBadge">Modo</div>

        <div class="dream-label">Tu sueño</div>
        <div class="dream-preview" id="dreamPreview"></div>

        <div class="section-title">Interpretación</div>
        <div class="interpretation" id="interpretationText"></div>

        <div class="result-actions">
          <button class="primary" onclick="shareDream()">Compartir</button>
          <button class="secondary" onclick="saveCurrentToHistory()">Guardar en historial</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="history-header">
        <h3 class="history-title">Historial</h3>
        <button class="clear-btn" onclick="clearHistory()">Borrar historial</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://TU-WORKER.workers.dev";

    let currentDream = {
      dream: "",
      mode: "",
      interpretation: "",
      image: ""
    };

    function setStatus(text) {
      document.getElementById("status").textContent = text || "";
    }

    function prettyMode(mode) {
      if (mode === "emocional") return "Emocional";
      if (mode === "psicoanalitica" || mode === "psicoanalítica") return "Psicoanalítica";
      return "Intuitiva";
    }

    function normalizeModeValue(mode) {
      if (mode === "psicoanalítica") return "psicoanalitica";
      return mode || "intuitiva";
    }

    async function submitDream() {
      const dream = document.getElementById("dreamInput").value.trim();
      const mode = document.getElementById("modeSelect").value;
      const interpretBtn = document.getElementById("interpretBtn");

      if (!dream) {
        setStatus("Primero escribí un sueño.");
        return;
      }

      interpretBtn.disabled = true;
      setStatus("Interpretando sueño...");

      try {
        const res = await fetch(`${WORKER_URL}/interpret`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream, mode })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data?.error || "No se pudo interpretar");
        }

        currentDream = {
          dream,
          mode: data.mode,
          interpretation: data.interpretation,
          image: currentDream.image || ""
        };

        renderResult();
        setStatus("Interpretación lista.");
      } catch (err) {
        console.error(err);
        setStatus("Error al interpretar el sueño.");
      } finally {
        interpretBtn.disabled = false;
      }
    }

    async function generateImage() {
      const dream = document.getElementById("dreamInput").value.trim();
      const imageBtn = document.getElementById("imageBtn");

      if (!dream) {
        setStatus("Primero escribí un sueño.");
        return;
      }

      imageBtn.disabled = true;
      setStatus("Generando imagen...");

      try {
        const res = await fetch(`${WORKER_URL}/generate-image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data?.error || "No se pudo generar la imagen");
        }

        currentDream.dream = dream;
        currentDream.image = data.imageUrl;

        renderImage();
        setStatus("Imagen generada.");
      } catch (err) {
        console.error(err);
        setStatus("Error al generar la imagen.");
      } finally {
        imageBtn.disabled = false;
      }
    }

    function renderResult() {
      document.getElementById("resultCard").style.display = "block";
      document.getElementById("modeBadge").textContent = prettyMode(currentDream.mode);
      document.getElementById("dreamPreview").textContent = currentDream.dream;
      document.getElementById("interpretationText").textContent = currentDream.interpretation;
      renderImage();
      window.scrollTo({ top: document.getElementById("resultCard").offsetTop - 20, behavior: "smooth" });
    }

    function renderImage() {
      const imageWrap = document.getElementById("imageWrap");

      if (currentDream.image) {
        imageWrap.innerHTML = `<img src="${currentDream.image}" alt="Imagen del sueño">`;
      } else {
        imageWrap.innerHTML = `<div class="image-placeholder">Todavía no generaste una imagen para este sueño.</div>`;
      }
    }

    function saveCurrentToHistory() {
      if (!currentDream.dream || !currentDream.interpretation) {
        setStatus("Todavía no hay un sueño interpretado para guardar.");
        return;
      }

      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");

      history.unshift({
        ...currentDream,
        createdAt: new Date().toISOString()
      });

      localStorage.setItem("onyra_history", JSON.stringify(history.slice(0, 20)));
      renderHistory();
      setStatus("Sueño guardado en historial.");
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");
      const list = document.getElementById("historyList");

      if (!history.length) {
        list.innerHTML = `<div class="history-item">Todavía no guardaste sueños.</div>`;
        return;
      }

      list.innerHTML = history.map((item, index) => `
        <div class="history-item" onclick="loadHistoryItem(${index})">
          <div class="history-top">
            <div class="history-dream">${escapeHtml(truncate(item.dream, 90))}</div>
            <div class="history-mode">${prettyMode(item.mode)}</div>
          </div>
          <div class="history-date">${formatDate(item.createdAt)}</div>
          <div class="mini">${escapeHtml(truncate(item.interpretation, 120))}</div>
        </div>
      `).join("");
    }

    function loadHistoryItem(index) {
      const history = JSON.parse(localStorage.getItem("onyra_history") || "[]");
      const item = history[index];
      if (!item) return;

      currentDream = item;
      document.getElementById("dreamInput").value = item.dream;
      document.getElementById("modeSelect").value = normalizeModeValue(item.mode);
      renderResult();
      setStatus("Sueño cargado desde historial.");
    }

    function clearHistory() {
      localStorage.removeItem("onyra_history");
      renderHistory();
      setStatus("Historial borrado.");
    }

    async function shareDream() {
      if (!currentDream.dream || !currentDream.interpretation) {
        setStatus("Todavía no hay contenido para compartir.");
        return;
      }

      const text = `✨ ONYRA

Sueño:
${currentDream.dream}

Interpretación (${prettyMode(currentDream.mode)}):
${currentDream.interpretation}

Descubrí tus sueños en ONYRA`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text
          });
          setStatus("Compartido.");
        } else {
          await navigator.clipboard.writeText(text);
          setStatus("No se pudo abrir compartir, pero copié el texto.");
        }
      } catch (err) {
        console.error(err);
        setStatus("No se pudo compartir.");
      }
    }

    function truncate(text, max) {
      if (!text) return "";
      return text.length > max ? text.slice(0, max) + "..." : text;
    }

    function formatDate(isoDate) {
      const d = new Date(isoDate);
      return d.toLocaleString();
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderHistory();
  </script>
</body>
</html>
