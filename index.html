<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONYRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .app {
      max-width: 460px;
      margin: 0 auto;
    }
    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 16px;
      margin-bottom: 10px;
    }
    button {
      margin: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    #status {
      margin-top: 12px;
      min-height: 22px;
    }
    #dreamImage {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🌙 ONYRA</h1>
    <p>Prueba simple para iPhone</p>

    <textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea>
    <div>
      <button onclick="probarImagen()">Generar imagen</button>
    </div>

    <p id="status"></p>
    <img id="dreamImage" alt="Imagen generada">
  </div>

  <script>
    let lastBlobUrl = "";

    async function generateAI(dream) {
      const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ dream })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Error generando imagen");
      }

      if (!data.imageUrl) {
        throw new Error("No vino imageUrl");
      }

      return data.imageUrl;
    }

    function dataUrlToBlobUrl(dataUrl) {
      const parts = dataUrl.split(",");
      const mime = parts[0].match(/:(.*?);/)[1];
      const binary = atob(parts[1]);
      const len = binary.length;
      const bytes = new Uint8Array(len);

      for (let i = 0; i < len; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      const blob = new Blob([bytes], { type: mime });
      return URL.createObjectURL(blob);
    }

    async function probarImagen() {
      const dream = document.getElementById("dreamInput").value.trim();
      const status = document.getElementById("status");
      const img = document.getElementById("dreamImage");

      if (!dream) {
        status.textContent = "Escribí un sueño primero.";
        return;
      }

      try {
        status.textContent = "Generando imagen...";
        img.style.display = "none";

        const dataUrl = await generateAI(dream);

        if (lastBlobUrl) {
          URL.revokeObjectURL(lastBlobUrl);
        }

        lastBlobUrl = dataUrlToBlobUrl(dataUrl);

        img.src = lastBlobUrl;
        img.style.display = "block";
        status.textContent = "✨ Imagen generada";
      } catch (error) {
        console.error(error);
        status.textContent = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
