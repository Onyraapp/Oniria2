<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .app {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #bbb;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #444;
      font-size: 16px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 15px;
      margin-bottom: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .generate-btn {
      background: #7c3aed;
      color: white;
    }

    .share-btn {
      background: #10b981;
      color: white;
    }

    .status {
      margin: 15px 0;
      font-size: 15px;
      color: #ddd;
      min-height: 24px;
    }

    img {
      max-width: 100%;
      border-radius: 14px;
      display: none;
      margin-top: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>ONYRA</h1>
    <p>Descubrí qué dicen tus sueños</p>

    <textarea id="dreamText" placeholder="Contá tu sueño..."></textarea>

    <div class="buttons">
      <button class="generate-btn" onclick="submitDream()">Generar imagen</button>
      <button class="share-btn" onclick="shareDream()">Compartir mi sueño</button>
    </div>

    <div id="status" class="status"></div>

    <img id="dreamImage" alt="Imagen generada del sueño" />
  </div>

  <script>
    let lastImageUrl = "";
    let currentDream = {};

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    async function submitDream() {
      try {
        const dreamText = document.getElementById("dreamText").value.trim();
        const dreamImage = document.getElementById("dreamImage");

        if (!dreamText) {
          alert("Por favor, escribí tu sueño antes de generar la imagen.");
          return;
        }

        setStatus("Generando imagen...");

        // ============================
        // OPCIÓN A: DEMO LOCAL
        // ============================
        // Si todavía no querés conectar tu worker acá,
        // dejá esta línea de prueba.
        // Cuando quieras usar tu worker real, reemplazá
        // solo este bloque por tu fetch/worker.
        const imageUrl = await generateDemoImage();

        // Guardamos la imagen correctamente
        currentDream = {
          text: dreamText,
          image: imageUrl
        };
        lastImageUrl = imageUrl;

        // La mostramos
        dreamImage.src = imageUrl;
        dreamImage.style.display = "block";

        setStatus("Imagen generada.");
      } catch (error) {
        console.error("Error al generar imagen:", error);
        setStatus("Hubo un error al generar la imagen.");
        alert("No se pudo generar la imagen.");
      }
    }

    async function shareDream() {
      try {
        const text = document.getElementById("dreamText").value.trim() || "Mirá el sueño que generé con ONYRA";
        const imageUrl = lastImageUrl || currentDream.image;

        if (!imageUrl) {
          alert("Primero generá una imagen.");
          return;
        }

        setStatus("Preparando para compartir...");

        const blob = await urlToBlob(imageUrl);
        const file = new File([blob], "onyra-sueno.png", { type: blob.type || "image/png" });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: text,
            files: [file]
          });
          setStatus("Imagen compartida.");
          return;
        }

        // Fallback: descarga la imagen
        const a = document.createElement("a");
        a.href = imageUrl;
        a.download = "onyra-sueno.png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setStatus("Tu navegador no permite compartir el archivo. Se descargó la imagen.");
      } catch (error) {
        console.error("Error al compartir:", error);
        setStatus("No se pudo compartir la imagen.");
        alert("No se pudo compartir la imagen.");
      }
    }

    async function urlToBlob(url) {
      const response = await fetch(url);
      return await response.blob();
    }

    async function generateDemoImage() {
      // Demo simple para que no falle la app mientras ordenamos botones.
      // Genera una imagen SVG convertida a data URL.
      const dreamText = document.getElementById("dreamText").value.trim();

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#1e1b4b"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" fill="url(#bg)"/>
          <circle cx="780" cy="210" r="90" fill="rgba(255,255,255,0.18)"/>
          <text x="512" y="180" text-anchor="middle" fill="white" font-size="54" font-family="Arial" font-weight="bold">ONYRA</text>
          <text x="512" y="260" text-anchor="middle" fill="white" font-size="28" font-family="Arial">Tu sueño interpretado en imagen</text>
          <foreignObject x="120" y="340" width="784" height="420">
            <div xmlns="http://www.w3.org/1999/xhtml"
                 style="font-family: Arial; color: white; font-size: 34px; line-height: 1.4; text-align: center; padding: 30px;">
              ${escapeHtml(dreamText)}
            </div>
          </foreignObject>
        </svg>
      `;

      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
