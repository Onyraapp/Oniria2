<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: #171720;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #c8c8d0;
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1px solid #33384a;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      background: #101018;
      color: white;
      outline: none;
    }

    textarea:focus {
      border-color: #7c3aed;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #7c3aed;
      color: white;
    }

    .secondary {
      background: #10b981;
      color: white;
    }

    .status {
      min-height: 24px;
      color: #d7d7df;
      margin-bottom: 16px;
    }

    .image-wrap {
      margin-top: 8px;
      text-align: center;
    }

    #dreamImage {
      display: none;
      width: 100%;
      max-width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .hint {
      margin-top: 14px;
      color: #a9a9b5;
      font-size: 14px;
      line-height: 1.5;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #8d8d98;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>ONYRA</h1>
    <div class="subtitle">Descubrí qué dicen tus sueños</div>

    <label for="dreamText">Contá tu sueño</label>
    <textarea id="dreamText" placeholder="Ejemplo: soñé que caminaba por un bosque oscuro y encontraba una puerta iluminada..."></textarea>

    <div class="buttons">
      <button class="primary" onclick="submitDream()">Generar imagen</button>
      <button class="secondary" onclick="shareDream()">Compartir mi sueño</button>
    </div>

    <div id="status" class="status"></div>

    <div class="image-wrap">
      <img id="dreamImage" alt="Imagen del sueño generada por ONYRA" />
    </div>

    <div class="hint">
      Esta versión está pensada para que funcione limpia y estable.<br>
      Primero generá la imagen. Después usá compartir.
    </div>

    <div class="footer">
      ONYRA
    </div>
  </div>

  <script>
    let lastImageUrl = "";
    let currentDream = {};

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function submitDream() {
      try {
        const textArea = document.getElementById("dreamText");
        const imageEl = document.getElementById("dreamImage");
        const dreamText = textArea.value.trim();

        if (!dreamText) {
          alert("Escribí tu sueño primero.");
          return;
        }

        setStatus("Generando imagen...");

        // =========
        // VERSIÓN ESTABLE
        // =========
        // Esto genera una imagen demo linda y funcional.
        // Así validamos botones, pantalla y compartir sin que falle todo.
        const imageUrl = await generateDreamCard(dreamText);

        currentDream = {
          text: dreamText,
          image: imageUrl
        };

        lastImageUrl = imageUrl;

        imageEl.src = imageUrl;
        imageEl.style.display = "block";

        setStatus("Imagen generada.");
      } catch (error) {
        console.error("Error en submitDream:", error);
        setStatus("Error al generar imagen.");
        alert("No se pudo generar la imagen.");
      }
    }

    async function shareDream() {
      try {
        const text = document.getElementById("dreamText").value.trim() || "Mirá mi sueño en ONYRA";
        const imageUrl = lastImageUrl || currentDream.image;

        if (!imageUrl) {
          alert("Primero generá una imagen.");
          return;
        }

        setStatus("Preparando para compartir...");

        const blob = await urlToBlob(imageUrl);
        const file = new File([blob], "onyra-sueno.png", {
          type: blob.type || "image/png"
        });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: text,
            files: [file]
          });
          setStatus("Imagen compartida.");
          return;
        }

        // Fallback: descarga
        const link = document.createElement("a");
        link.href = imageUrl;
        link.download = "onyra-sueno.png";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setStatus("Tu navegador no permite compartir directamente. Se descargó la imagen.");
      } catch (error) {
        console.error("Error en shareDream:", error);
        setStatus("No se pudo compartir la imagen.");
        alert("No se pudo compartir la imagen.");
      }
    }

    async function urlToBlob(url) {
      const response = await fetch(url);
      return await response.blob();
    }

    async function generateDreamCard(dreamText) {
      const safeText = escapeHtml(dreamText);

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0f172a"/>
              <stop offset="55%" stop-color="#312e81"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity="0.3"/>
            </filter>
          </defs>

          <rect width="1080" height="1350" fill="url(#bg)"/>

          <circle cx="850" cy="220" r="120" fill="rgba(255,255,255,0.10)"/>
          <circle cx="220" cy="1080" r="180" fill="rgba(255,255,255,0.06)"/>

          <rect x="70" y="90" rx="36" ry="36" width="940" height="1170" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.12)" filter="url(#shadow)"/>

          <text x="540" y="190" text-anchor="middle" fill="white" font-size="64" font-family="Arial" font-weight="700">ONYRA</text>
          <text x="540" y="250" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="28" font-family="Arial">
            Tu sueño convertido en imagen
          </text>

          <foreignObject x="130" y="340" width="820" height="620">
            <div xmlns="http://www.w3.org/1999/xhtml"
                 style="
                   font-family: Arial, sans-serif;
                   color: white;
                   font-size: 38px;
                   line-height: 1.45;
                   text-align: center;
                   display: flex;
                   justify-content: center;
                   align-items: center;
                   width: 100%;
                   height: 100%;
                   padding: 10px;
                 ">
              ${safeText}
            </div>
          </foreignObject>

          <text x="540" y="1120" text-anchor="middle" fill="rgba(255,255,255,0.90)" font-size="26" font-family="Arial">
            Compartido desde ONYRA
          </text>

          <text x="540" y="1165" text-anchor="middle" fill="rgba(255,255,255,0.62)" font-size="22" font-family="Arial">
            Descubrí qué dicen tus sueños
          </text>
        </svg>
      `;

      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }
  </script>
</body>
</html>
