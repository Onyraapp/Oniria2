<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONYRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; }
    input {
      width: 80%;
      max-width: 400px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #dreamImage {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 10px;
      display: none;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>🌙 ONYRA</h1>

  <input id="dreamInput" placeholder="Contá tu sueño..." />
  <br>
  <button onclick="probarImagen()">Generar imagen</button>
  <p id="status"></p>
  <img id="dreamImage" alt="Imagen del sueño" />

  <script>
    async function generateAIImage(dreamText) {
      const workerUrl = "https://onyra-final-ok.almacenmujica.workers.dev";

      const res = await fetch(workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ dream: dreamText })
      });

      const data = await res.json();

      if (!res.ok) {
        console.error("Error worker:", data);
        throw new Error(data?.error || "Error generando imagen");
      }

      if (!data.imageUrl) {
        throw new Error("No vino imageUrl");
      }

      return data.imageUrl;
    }

    async function probarImagen() {
      const img = document.getElementById("dreamImage");
      const status = document.getElementById("status");
      const dream = document.getElementById("dreamInput").value;

      if (!dream) {
        status.textContent = "Escribí un sueño primero";
        return;
      }

      try {
        status.textContent = "Generando imagen...";
        img.style.display = "none";

        const imageUrl = await generateAIImage(dream);

        img.src = imageUrl;
        img.style.display = "block";
        status.textContent = "Imagen generada ✨";
      } catch (e) {
        console.error(e);
        status.textContent = "Error: " + e.message;
      }
    }
  </script>

</body>
</html>
