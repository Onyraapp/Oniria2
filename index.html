<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111218;
      color: white;
      padding: 24px;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      background: #1a1c24;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 8px; text-align: center; }
    .subtitle {
      text-align: center;
      color: #c8c8d0;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #3a3f52;
      background: #0f1118;
      color: white;
      font-size: 16px;
      resize: vertical;
    }
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
      margin-bottom: 16px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .generate { background: #7c3aed; color: white; }
    .share { background: #10b981; color: white; }
    #status {
      min-height: 24px;
      color: #d8d8df;
      margin-bottom: 14px;
      font-weight: bold;
    }
    #dreamImage {
      display: none;
      width: 100%;
      border-radius: 14px;
      margin-top: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    #debug {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #0c0d12;
      border: 1px solid #2a3040;
      color: #b9c3d6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>ONYRA</h1>
    <div class="subtitle">Descubrí qué dicen tus sueños</div>

    <textarea id="dreamText" placeholder="Contá tu sueño..."></textarea>

    <div class="buttons">
      <button class="generate" type="button" onclick="submitDream()">Generar imagen</button>
      <button class="share" type="button" onclick="shareDream()">Compartir mi sueño</button>
    </div>

    <div id="status">Versión click-fix cargada</div>
    <img id="dreamImage" alt="Imagen generada del sueño" />
    <div id="debug">Esperando prueba...</div>
  </div>

  <script>
    const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";

    let lastImageUrl = "";
    let currentDream = {};

    const dreamText = document.getElementById("dreamText");
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");
    const dreamImage = document.getElementById("dreamImage");

    function setStatus(texto) {
      statusEl.textContent = texto;
    }

    function setDebug(texto) {
      debugEl.textContent = texto;
    }

  async function generateAIImage(texto) {
  const payload = { dream: texto };

  setDebug(
    "Worker: " + WORKER_URL + "\n\n" +
    "Payload enviado:\n" +
    JSON.stringify(payload, null, 2)
  );

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 45000);

  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    const rawText = await response.text();

    setDebug(
      "Status HTTP: " + response.status + "\n\n" +
      "Respuesta cruda:\n" + rawText
    );

    let data;
    try {
      data = JSON.parse(rawText);
    } catch (e) {
      throw new Error("La respuesta no es JSON válido");
    }

    if (!response.ok) {
      throw new Error(
        data?.error ||
        data?.details?.error?.message ||
        ("HTTP " + response.status)
      );
    }

    if (!data.imageUrl) {
      throw new Error("La respuesta no trajo imageUrl");
    }

    return data.imageUrl;
  } catch (error) {
    if (error.name === "AbortError") {
      throw new Error("El worker tardó demasiado en responder");
    }
    throw error;
  } finally {
    clearTimeout(timeout);
  }
}
    async function submitDream() {
      try {
        const texto = dreamText.value.trim();

        if (!texto) {
          alert("Escribí tu sueño primero.");
          return;
        }

        setStatus("Generando imagen IA...");
        dreamImage.style.display = "none";
        dreamImage.removeAttribute("src");

        const imageUrl = await generateAIImage(texto);

        currentDream = { text: texto, image: imageUrl };
        lastImageUrl = imageUrl;

        dreamImage.onload = function () {
          setStatus("Imagen generada.");
          setDebug(debugEl.textContent + "\n\nLa imagen cargó correctamente.");
        };

        dreamImage.onerror = function () {
          setStatus("La imagen llegó pero no se pudo mostrar.");
          setDebug(debugEl.textContent + "\n\nError: el navegador no pudo mostrar la imagen.");
        };

        dreamImage.src = imageUrl;
        dreamImage.style.display = "block";
      } catch (error) {
        console.error("Error en submitDream:", error);
        setStatus("Error al generar imagen.");
        setDebug(debugEl.textContent + "\n\nError final:\n" + error.message);
        alert("Error al generar imagen: " + error.message);
      }
    }

    async function urlToBlob(url) {
      const response = await fetch(url);
      return await response.blob();
    }

    async function shareDream() {
      try {
        const texto = dreamText.value.trim() || "Mirá mi sueño en ONYRA";
        const imageUrl = lastImageUrl || currentDream.image;

        if (!imageUrl) {
          alert("Primero generá una imagen.");
          return;
        }

        setStatus("Preparando para compartir...");

        const blob = await urlToBlob(imageUrl);
        const file = new File([blob], "onyra-sueno.png", {
          type: blob.type || "image/png"
        });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: texto,
            files: [file]
          });
          setStatus("Imagen compartida.");
          return;
        }

        const link = document.createElement("a");
        link.href = imageUrl;
        link.download = "onyra-sueno.png";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setStatus("Tu navegador no permite compartir directo. Se descargó la imagen.");
      } catch (error) {
        console.error("Error en shareDream:", error);
        setStatus("No se pudo compartir la imagen.");
        setDebug(debugEl.textContent + "\n\nError compartir:\n" + error.message);
      }
    }

    setDebug("Página cargada correctamente. Probá generar.");
  </script>
</body>
</html>
