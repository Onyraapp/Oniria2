<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA DEBUG</title>

<style>
body{
background:#0a0a0f;
color:white;
font-family:Arial;
padding:20px;
max-width:600px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
background:#111;
color:white;
border:1px solid #333;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
background:#d9b26f;
cursor:pointer;
}

#result img{
width:100%;
margin-top:15px;
border-radius:10px;
}

pre{
background:#111;
padding:10px;
border-radius:10px;
overflow:auto;
font-size:12px;
}
</style>
</head>

<body>

<h1>ONYRA DEBUG</h1>

<textarea id="dream" placeholder="Soñé que volaba..."></textarea>

<button onclick="go()">INTERPRETAR</button>

<div id="result"></div>

<script>

const WORKER_URL = "https://onyra-final-ok.almacenmujica.workers.dev";

async function go(){

const dream = document.getElementById("dream").value;

document.getElementById("result").innerHTML = "Cargando...";

try{

const res = await fetch(WORKER_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({dream})
});

const data = await res.json();

// 🔥 MOSTRAR RESPUESTA COMPLETA
if(!data.ok){
document.getElementById("result").innerHTML = `
<h3>ERROR</h3>
<pre>${JSON.stringify(data, null, 2)}</pre>
`;
return;
}

// ✅ RESULTADO OK
document.getElementById("result").innerHTML = `
<h3>Respuesta</h3>
<pre>${JSON.stringify(data, null, 2)}</pre>

${data.imageUrl ? `<img src="${data.imageUrl}">` : ""}

<p>${data.interpretation}</p>
`;

}catch(err){

document.getElementById("result").innerHTML = `
<h3>ERROR FETCH</h3>
<pre>${err}</pre>
`;

}

}

</script>

</body>
</html>
