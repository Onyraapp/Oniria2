<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ONYRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f1020;
  color: white;
  text-align: center;
  padding: 20px;
}

textarea, select {
  width: 90%;
  max-width: 400px;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
}

img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
}

#interpretation {
  margin-top: 10px;
  color: #bfc3ff;
}
</style>
</head>

<body>

<h1>🌙 ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

<select id="style">
  <option value="oscuro">Oscuro</option>
  <option value="cine">Cine</option>
  <option value="surreal">Surreal</option>
</select><br>

<button onclick="generar()">Generar</button>

<p id="status"></p>

<img id="img">
<p id="interpretation"></p>

<script>

const WORKER = "https://onyra-final-ok.almacenmujica.workers.dev";

async function generar() {
  const dream = document.getElementById("dreamInput").value;
  const style = document.getElementById("style").value;

  document.getElementById("status").innerText = "Generando...";

  // imagen
  const imgRes = await fetch(WORKER + "/image", {
    method: "POST",
    body: JSON.stringify({ dream, style })
  });

  const imgData = await imgRes.json();

  document.getElementById("img").src = imgData.imageUrl;

  // interpretación
  const intRes = await fetch(WORKER + "/interpret", {
    method: "POST",
    body: JSON.stringify({ dream })
  });

  const intData = await intRes.json();

  document.getElementById("interpretation").innerText = intData.interpretation;

  document.getElementById("status").innerText = "✨ Listo";
}

</script>

</body>
</html>
