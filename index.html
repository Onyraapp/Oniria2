<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: 'Helvetica Neue', sans-serif;
  background: linear-gradient(180deg,#0f0f1a,#1c1c2e);
  color:white;
}

.container {
  max-width: 420px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  letter-spacing:3px;
}

textarea {
  width:100%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  font-size:14px;
  margin-top:15px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:12px;
  font-size:14px;
  cursor:pointer;
}

.primary {
  background:#6c5ce7;
  color:white;
}

.result-card {
  margin-top:20px;
  background:#1f1f2e;
  border-radius:16px;
  overflow:hidden;
}

.result-card img {
  width:100%;
}

.result-text {
  padding:15px;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
  font-size:12px;
  background:#2c2c3e;
  color:white;
}

#clearBtn {
  position:fixed;
  top:10px;
  right:10px;
  padding:8px 12px;
  font-size:11px;
  background:#2c2c3e;
}
</style>
</head>

<body>

<button id="clearBtn" onclick="clearAll()">Limpiar</button>

<div class="container">

<h1>ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea>

<button class="primary" onclick="submitDream()">Interpretar</button>

<div id="result"></div>

<div class="actions" id="actions" style="display:none;">
  <button onclick="saveDream()">Guardar</button>
  <button onclick="shareDream()">Story</button>
  <button onclick="toggleHistory()">Historial</button>
</div>

<div id="history"></div>

</div>

<canvas id="storyCanvas" width="1080" height="1920" style="display:none;"></canvas>

<script>
const WORKER_URL = "https://onyra-worker.almacenmujica.workers.dev";

let currentDream = {};
let history = JSON.parse(localStorage.getItem("onyraHistory")) || [];

async function submitDream() {
  const dream = document.getElementById("dreamInput").value.trim();

  if (!dream) return alert("Escribí un sueño");

  document.getElementById("result").innerHTML = "Interpretando...";
  document.getElementById("actions").style.display = "none";

  try {
    const res = await fetch(WORKER_URL, {
      method:"POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dream })
    });

    const data = await res.json();

    if (!data.text) throw new Error("No llegó interpretación");

    currentDream = {
      dream,
      interpretation: data.text,
      image: data.imageUrl
    };

    renderResult();
    document.getElementById("actions").style.display = "flex";

  } catch (err) {
    document.getElementById("result").innerHTML = "Error: " + err.message;
    console.error(err);
  }
}

function renderResult() {
  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <img src="${currentDream.image}">
      <div class="result-text">
        <p>${currentDream.interpretation}</p>
      </div>
    </div>
  `;
}

function saveDream() {
  history.unshift(currentDream);
  localStorage.setItem("onyraHistory", JSON.stringify(history));
  alert("Guardado");
}

function toggleHistory() {
  const div = document.getElementById("history");

  if (div.innerHTML !== "") {
    div.innerHTML = "";
    return;
  }

  div.innerHTML = history.map(h => `
    <div style="margin-top:15px;">
      <img src="${h.image}" style="width:100%;border-radius:10px;">
      <p>${h.interpretation}</p>
    </div>
  `).join("");
}

async function shareDream() {
  if (!currentDream.image || !currentDream.interpretation) {
    alert("Primero interpretá un sueño");
    return;
  }

  const canvas = document.getElementById("storyCanvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = currentDream.image;

  img.onload = function () {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const ratio = Math.max(
      canvas.width / img.width,
      canvas.height / img.height
    );

    const newWidth = img.width * ratio;
    const newHeight = img.height * ratio;

    const x = (canvas.width - newWidth) / 2;
    const y = (canvas.height - newHeight) / 2;

    ctx.drawImage(img, x, y, newWidth, newHeight);

    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "rgba(8,8,18,0.18)");
    gradient.addColorStop(0.45, "rgba(8,8,18,0.32)");
    gradient.addColorStop(0.72, "rgba(8,8,18,0.62)");
    gradient.addColorStop(1, "rgba(8,8,18,0.92)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.font = "bold 64px Arial";
    ctx.fillText("ONYRA", 70, 125);

    ctx.fillStyle = "rgba(255,255,255,0.62)";
    ctx.font = "28px Arial";
    ctx.fillText("descubrí lo que tu mente no te dice", 70, 170);

    const firstSentence = getFirstSentence(currentDream.interpretation);
    const remainingText = currentDream.interpretation
      .replace(firstSentence, "")
      .trim();

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 56px Arial";
    drawWrappedText(ctx, firstSentence, 70, 980, 940, 64, 4);

    ctx.fillStyle = "rgba(255,255,255,0.84)";
    ctx.font = "36px Arial";
    drawWrappedText(ctx, remainingText, 70, 1260, 940, 50, 8);

    ctx.fillStyle = "rgba(255,255,255,0.54)";
    ctx.font = "24px Arial";
    ctx.fillText("onyra.app", 70, 1845);

    const url = canvas.toDataURL("image/png");

    const link = document.createElement("a");
    link.download = "onyra_story.png";
    link.href = url;
    link.click();
  };

  img.onerror = function () {
    alert("No se pudo generar la story");
  };
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";

  for (let i=0;i<words.length;i++){
    const testLine = line + words[i] + " ";
    const width = ctx.measureText(testLine).width;

    if (width > maxWidth && i>0){
      ctx.fillText(line,x,y);
      line = words[i] + " ";
      y += lineHeight;
    } else {
      line = testLine;
    }
  }

  ctx.fillText(line,x,y);
}

function clearAll() {
  document.getElementById("dreamInput").value="";
  document.getElementById("result").innerHTML="";
  document.getElementById("actions").style.display="none";
}
</script>

</body>
</html>
