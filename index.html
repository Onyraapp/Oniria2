<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b12;
  color:white;
}

.screen {
  display:none;
  min-height:100vh;
  padding:24px;
  box-sizing:border-box;
}

.screen.active {
  display:block;
}

button {
  padding:12px 18px;
  border-radius:10px;
  border:none;
  background:#7C5CFF;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

textarea {
  width:100%;
  height:140px;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HOME (abre directo) -->
<div class="screen active" id="s-home">
  <h1>ONYRA</h1>
  <p>¿Qué soñaste anoche?</p>

  <button onclick="go('compose')">Contar mi sueño</button>
  <button onclick="go('history')">Historial</button>
</div>

<!-- COMPOSE -->
<div class="screen" id="s-compose">
  <h2>Contá tu sueño</h2>

  <textarea id="dreamInput" placeholder="Escribí tu sueño..."></textarea>

  <button onclick="submitDream()">Interpretar</button>
  <button onclick="go('home')">Volver</button>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <h2>Resultado</h2>
  <p id="resultText"></p>

  <button onclick="go('home')">Volver</button>
</div>

<!-- HISTORY -->
<div class="screen" id="s-history">
  <h2>Historial</h2>
  <div id="historyList"></div>

  <button onclick="go('home')">Volver</button>
</div>

<script>

function go(s){
  document.querySelectorAll('.screen').forEach(el=>{
    el.classList.remove('active');
  });

  const target = document.getElementById('s-' + s);

  if(!target){
    document.body.innerHTML = "Error: pantalla no encontrada " + s;
    return;
  }

  target.classList.add('active');

  if(s === 'history') renderHistory();
}

function submitDream(){
  const text = document.getElementById('dreamInput').value;

  if(!text){
    alert("Escribí un sueño");
    return;
  }

  let used = localStorage.getItem('used') || 0;

  if(parseInt(used) >= 1){
    alert("Ya usaste tu sueño gratis hoy");
    return;
  }

  localStorage.setItem('used', parseInt(used) + 1);

  document.getElementById('resultText').innerText =
    "Tu sueño parece reflejar emociones internas que todavía no terminaste de procesar. Hay elementos que indican tensión, curiosidad o algo que tu mente está intentando entender más profundamente.";

  saveDream(text);

  go('result');
}

  document.getElementById('resultText').innerText =
   "Tu sueño parece reflejar emociones internas que todavía no terminaste de procesar. Hay elementos que indican tensión, curiosidad o algo que tu mente está intentando entender más profundamente."

  saveDream(text);

  go('result');
}

function saveDream(text){
  let dreams = JSON.parse(localStorage.getItem('dreams') || '[]');

  dreams.unshift({
    text,
    date: new Date().toLocaleString()
  });

  localStorage.setItem('dreams', JSON.stringify(dreams));
}

function renderHistory(){
  const container = document.getElementById('historyList');
  const dreams = JSON.parse(localStorage.getItem('dreams') || '[]');

  container.innerHTML = "";

  dreams.forEach(d=>{
    const div = document.createElement('div');
    div.style.marginBottom = "10px";
    div.innerHTML = "<b>"+d.date+"</b><br>"+d.text;
    container.appendChild(div);
  });
}

</script>

</body>
</html>
