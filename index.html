<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYRA</title>

  <style>
    :root {
      --bg-1: #06060c;
      --bg-2: #11111f;
      --bg-3: #18182b;
      --card: rgba(18, 18, 32, 0.82);
      --card-2: rgba(24, 24, 42, 0.92);
      --stroke: rgba(255,255,255,0.08);
      --stroke-strong: rgba(255,255,255,0.16);
      --text: #f5f3ff;
      --muted: rgba(255,255,255,0.68);
      --soft: rgba(255,255,255,0.45);
      --accent: #8b7cff;
      --accent-2: #6558ff;
      --shadow: 0 24px 70px rgba(0,0,0,0.45);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(139,124,255,0.22), transparent 26%),
        radial-gradient(circle at 20% 18%, rgba(101,88,255,0.16), transparent 22%),
        radial-gradient(circle at 80% 8%, rgba(255,255,255,0.06), transparent 18%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 18px 16px 42px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .mini-btn {
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: 0.2s ease;
    }

    .mini-btn:hover {
      color: white;
      border-color: var(--stroke-strong);
      background: rgba(255,255,255,0.07);
    }

    .hero {
      position: relative;
      padding: 26px 20px 22px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(15,15,28,0.72);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -20% auto auto -10%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,124,255,0.42), transparent 70%);
      filter: blur(8px);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -10px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1;
    }

    .brand {
      position: relative;
      margin: 16px 0 8px;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 0.26em;
      line-height: 1;
      z-index: 1;
    }

    .headline {
      position: relative;
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: -0.03em;
      max-width: 320px;
      z-index: 1;
    }

    .subheadline {
      position: relative;
      margin: 12px 0 0;
      max-width: 330px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      z-index: 1;
    }

    .composer {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      padding: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .prompt-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 22px;
      padding: 12px;
    }

    textarea {
      width: 100%;
      min-height: 138px;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      font-family: inherit;
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.34);
    }

    .primary-btn {
      width: 100%;
      margin-top: 14px;
      padding: 17px 18px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 16px 36px rgba(101,88,255,0.34);
      transition: 0.18s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(101,88,255,0.42);
    }

    .status-card,
    .error-card {
      margin-top: 18px;
      padding: 18px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .status-title,
    .error-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .status-text,
    .error-text {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .error-title {
      color: #ffd2d2;
    }

    .result-card {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .result-image-wrap {
      position: relative;
      overflow: hidden;
    }

    .result-card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      background: #111;
      transform: scale(1.01);
    }

    .result-image-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.02) 0%,
        rgba(0,0,0,0.08) 36%,
        rgba(0,0,0,0.26) 100%
      );
      pointer-events: none;
    }

    .result-body {
      padding: 18px 18px 22px;
      position: relative;
    }

    .result-tag {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.76);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }

    .dream-title {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .result-text {
      color: rgba(255,255,255,0.88);
      font-size: 15px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .action-btn {
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 18px;
      padding: 14px 10px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: 0.18s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      border-color: var(--stroke-strong);
      background: rgba(255,255,255,0.08);
    }

    .history {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .history-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .history-card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
    }

    .history-body {
      padding: 14px 14px 16px;
    }

    .history-title {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 800;
    }

    .history-dream {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    .history-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.68;
      color: rgba(255,255,255,0.86);
    }

    .empty-state {
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--stroke);
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    @media (max-width: 420px) {
      .brand {
        font-size: 34px;
      }

      .headline {
        font-size: 22px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="mini-btn" onclick="clearAll()">Limpiar</button>
    </div>

    <section class="hero">
      <div class="hero-badge">Sueños · Imagen · Interpretación</div>
      <h1 class="brand">ONYRA</h1>
      <p class="headline">Convertí lo que soñaste en una pieza emocional y visual.</p>
      <p class="subheadline">Escribí tu sueño, dejá que ONYRA lo interprete y transformalo en algo que valga la pena compartir.</p>
    </section>

    <section class="composer">
      <div class="section-label">Escribí tu sueño</div>
      <div class="prompt-box">
        <textarea id="dreamInput" placeholder="Contá tu sueño con la mayor claridad posible..."></textarea>
      </div>
      <button class="primary-btn" onclick="submitDream()">Interpretar ahora</button>
    </section>

    <div id="result"></div>

    <div class="actions" id="actions" style="display:none;">
      <button class="action-btn" onclick="saveDream()">Guardar</button>
      <button class="action-btn" onclick="shareDream()">Compartir</button>
      <button class="action-btn" onclick="toggleHistory()">Historial</button>
    </div>

    <div id="history" class="history"></div>
  </div>

  <canvas id="storyCanvas" width="1080" height="1920" style="display:none;"></canvas>

  <script>
    const WORKER_URL = "https://onyra-worker.almacenmujica.workers.dev";

    let currentDream = {
      dream: "",
      interpretation: "",
      image: ""
    };

    let history = JSON.parse(localStorage.getItem("onyraHistory")) || [];

    async function submitDream() {
      const dream = document.getElementById("dreamInput").value.trim();

      if (!dream) {
        alert("Escribí un sueño");
        return;
      }

      document.getElementById("result").innerHTML = `
        <div class="status-card">
          <p class="status-title">Interpretando sueño...</p>
          <p class="status-text">ONYRA está leyendo el símbolo detrás de lo que soñaste y generando una imagen para vos.</p>
        </div>
      `;
      document.getElementById("actions").style.display = "none";

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ dream })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail ? JSON.stringify(data.detail) : (data.error || "Error desconocido"));
        }

        if (!data.text || !data.imageUrl) {
          throw new Error("La respuesta del worker no trajo text o imageUrl");
        }

        currentDream = {
          dream,
          interpretation: data.text,
          image: data.imageUrl
        };

        renderResult();
        document.getElementById("actions").style.display = "grid";
      } catch (err) {
        console.error(err);
        document.getElementById("result").innerHTML = `
          <div class="error-card">
            <p class="error-title">Error al interpretar</p>
            <p class="error-text">${escapeHtml(err.message)}</p>
          </div>
        `;
      }
    }

    function renderResult() {
      document.getElementById("result").innerHTML = `
        <div class="result-card">
          <div class="result-image-wrap">
            <img src="${currentDream.image}" alt="Sueño generado">
          </div>
          <div class="result-body">
            <div class="result-tag">Interpretación</div>
            <h2 class="dream-title">${escapeHtml(makeResultTitle(currentDream.dream))}</h2>
            <div class="result-text">${escapeHtml(currentDream.interpretation)}</div>
          </div>
        </div>
      `;
    }

    function makeResultTitle(dream) {
      const clean = dream.trim();
      if (!clean) return "Tu sueño";
      const clipped = clean.length > 54 ? clean.slice(0, 54).trim() + "..." : clean;
      return clipped.charAt(0).toUpperCase() + clipped.slice(1);
    }

    function saveDream() {
      if (!currentDream.dream) {
        alert("Primero interpretá un sueño");
        return;
      }

      history.unshift({ ...currentDream });
      localStorage.setItem("onyraHistory", JSON.stringify(history));
      alert("Guardado");
    }

    function toggleHistory() {
      const div = document.getElementById("history");

      if (div.innerHTML !== "") {
        div.innerHTML = "";
        return;
      }

      if (!history.length) {
        div.innerHTML = `<div class="empty-state">Todavía no hay sueños guardados.</div>`;
        return;
      }

      div.innerHTML = history.map(h => `
        <div class="history-card">
          <img src="${h.image}" alt="Sueño guardado">
          <div class="history-body">
            <h3 class="history-title">${escapeHtml(makeResultTitle(h.dream))}</h3>
            <p class="history-dream"><strong>Sueño:</strong> ${escapeHtml(h.dream)}</p>
            <p class="history-text">${escapeHtml(h.interpretation)}</p>
          </div>
        </div>
      `).join("");
    }

    async function shareDream() {
      if (!currentDream.image || !currentDream.interpretation) {
        alert("Primero interpretá un sueño");
        return;
      }

      const canvas = document.getElementById("storyCanvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = currentDream.image;

      img.onload = async function () {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
        const newWidth = img.width * ratio;
        const newHeight = img.height * ratio;

        const x = (canvas.width - newWidth) / 2;
        const y = (canvas.height - newHeight) / 2;

        ctx.drawImage(img, x, y, newWidth, newHeight);

        const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGradient.addColorStop(0, "rgba(6,6,15,0.10)");
        bgGradient.addColorStop(0.42, "rgba(6,6,15,0.28)");
        bgGradient.addColorStop(0.72, "rgba(6,6,15,0.58)");
        bgGradient.addColorStop(1, "rgba(6,6,15,0.92)");
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(255,255,255,0.94)";
        ctx.font = "bold 70px Arial";
        ctx.fillText("ONYRA", 74, 128);

        ctx.fillStyle = "rgba(255,255,255,0.64)";
        ctx.font = "28px Arial";
        ctx.fillText("descubrí lo que tu mente no te dice", 74, 172);

        roundRect(ctx, 48, 860, 984, 890, 42);
        ctx.fillStyle = "rgba(10,10,20,0.40)";
        ctx.fill();

        roundRect(ctx, 48, 860, 984, 890, 42);
        ctx.strokeStyle = "rgba(255,255,255,0.14)";
        ctx.lineWidth = 2;
        ctx.stroke();

        const glow = ctx.createLinearGradient(0, 860, 0, 1080);
        glow.addColorStop(0, "rgba(255,255,255,0.10)");
        glow.addColorStop(1, "rgba(255,255,255,0)");
        roundRect(ctx, 48, 860, 984, 210, 42);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = "24px Arial";
        ctx.fillText("Interpretación", 86, 930);

        const firstSentence = getFirstSentence(currentDream.interpretation);
        const remainingText = currentDream.interpretation.replace(firstSentence, "").trim();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 58px Arial";
        drawWrappedText(ctx, firstSentence, 86, 1012, 910, 66, 4);

        ctx.fillStyle = "rgba(255,255,255,0.84)";
        ctx.font = "36px Arial";
        drawWrappedText(ctx, remainingText, 86, 1324, 910, 52, 7);

        ctx.fillStyle = "rgba(255,255,255,0.54)";
        ctx.font = "24px Arial";
        ctx.fillText("onyra.app", 74, 1846);

        const dataUrl = canvas.toDataURL("image/png");

        if (navigator.share && navigator.canShare) {
          try {
            const file = dataURLtoFile(dataUrl, "onyra_story.png");
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({
                files: [file],
                title: "ONYRA",
                text: "Mi sueño interpretado en ONYRA"
              });
              return;
            }
          } catch (e) {
            console.log("Share nativo no disponible, descargo imagen.", e);
          }
        }

        const link = document.createElement("a");
        link.download = "onyra_story.png";
        link.href = dataUrl;
        link.click();
      };

      img.onerror = function () {
        alert("No se pudo generar la story.");
      };
    }

    function getFirstSentence(text) {
      const cleaned = text.trim();
      const match = cleaned.match(/.*?[.!?](\s|$)/);
      return match ? match[0].trim() : cleaned;
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = text.split(" ");
      let line = "";
      const lines = [];

      for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + " ";
        const testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && line !== "") {
          lines.push(line.trim());
          line = words[i] + " ";
        } else {
          line = testLine;
        }
      }

      if (line.trim()) lines.push(line.trim());

      const finalLines = lines.slice(0, maxLines);

      if (lines.length > maxLines) {
        finalLines[maxLines - 1] =
          finalLines[maxLines - 1].replace(/[.,;:!?-]?\s*$/, "") + "...";
      }

      for (let i = 0; i < finalLines.length; i++) {
        ctx.fillText(finalLines[i], x, y + i * lineHeight);
      }
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function dataURLtoFile(dataUrl, filename) {
      const arr = dataUrl.split(",");
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);

      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }

      return new File([u8arr], filename, { type: mime });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearAll() {
      document.getElementById("dreamInput").value = "";
      document.getElementById("result").innerHTML = "";
      document.getElementById("actions").style.display = "none";
      document.getElementById("history").innerHTML = "";
      currentDream = {
        dream: "",
        interpretation: "",
        image: ""
      };
    }
  </script>
</body>
</html>
