<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONYRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .app {
      max-width: 460px;
      margin: 0 auto;
    }

    textarea {
      width: 100%;
      max-width: 100%;
      height: 110px;
      border-radius: 10px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 16px;
    }

    button {
      margin: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button.danger {
      background: #d64545;
    }

    img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 10px;
      display: none;
    }

    #status {
      margin-top: 12px;
      min-height: 22px;
    }

    #interpretation {
      margin-top: 10px;
      color: #bfc3ff;
      line-height: 1.4;
    }

    #history {
      margin-top: 24px;
      text-align: left;
      max-width: 100%;
    }

    .item {
      background: #1a1d3a;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
      line-height: 1.35;
    }

    h1 {
      margin-bottom: 10px;
    }

    h3 {
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>🌙 ONYRA</h1>

    <textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea><br>

    <button onclick="probarImagen()">Generar</button>
    <button onclick="regenerar()">Otra versión</button>
    <button onclick="shareDream()">Compartir</button>
    <button class="danger" onclick="resetHistory()">Reset historial</button>

    <p id="status"></p>

    <img id="dreamImage" alt="Imagen generada del sueño">
    <p id="interpretation"></p>

    <div id="history"></div>
  </div>

  <script>
    let lastDream = "";

    function saveDream(dream) {
      let history = JSON.parse(localStorage.getItem("dreams") || "[]");
      history.unshift(dream);
      localStorage.setItem("dreams", JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const container = document.getElementById("history");
      const history = JSON.parse(localStorage.getItem("dreams") || "[]");

      container.innerHTML = "<h3>Historial</h3>";

      if (history.length === 0) {
        container.innerHTML += "<p style='opacity:0.7;'>Todavía no hay sueños guardados.</p>";
        return;
      }

      history.slice(0, 5).forEach(dream => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = dream;
        div.onclick = () => {
          document.getElementById("dreamInput").value = dream;
        };
        container.appendChild(div);
      });
    }

    function resetHistory() {
      const ok = confirm("¿Seguro querés borrar todo el historial?");
      if (!ok) return;

      localStorage.removeItem("dreams");
      renderHistory();
    }

    async function generateAIImage(dream) {
      const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ dream })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Error generando imagen");
      }

      if (!data.imageUrl) {
        throw new Error("No vino imagen");
      }

      return data.imageUrl;
    }

    function interpretarSueno(dream) {
      const text = dream.toLowerCase();

      if (text.includes("volar")) {
        return "Soñar que volás suele reflejar deseo de libertad, expansión o necesidad de escapar de una situación.";
      }

      if (text.includes("persegu")) {
        return "Soñar que te persiguen puede indicar ansiedad, presión o algo que estás evitando enfrentar.";
      }

      if (text.includes("agua") || text.includes("mar")) {
        return "El agua en los sueños suele estar vinculada al mundo emocional, la intuición y estados internos profundos.";
      }

      if (text.includes("caer")) {
        return "Soñar que caés puede relacionarse con inseguridad, pérdida de control o miedo al fracaso.";
      }

      return "Este sueño puede reflejar emociones internas y procesos mentales que tu mente sigue elaborando.";
    }

    async function probarImagen() {
      const dream = document.getElementById("dreamInput").value.trim();
      const img = document.getElementById("dreamImage");
      const status = document.getElementById("status");
      const interpretationBox = document.getElementById("interpretation");

      if (!dream) {
        status.textContent = "Escribí un sueño primero.";
        return;
      }

      lastDream = dream;
      status.textContent = "Interpretando sueño...";
      img.style.display = "none";
      interpretationBox.textContent = "";

      try {
        const url = await generateAIImage(dream);
        const interpretation = interpretarSueno(dream);

        img.src = url;
        img.style.display = "block";
        interpretationBox.textContent = interpretation;
        status.textContent = "✨ Sueño interpretado";

        saveDream(dream);
      } catch (e) {
        console.error(e);
        status.textContent = "Error: " + e.message;
      }
    }

    function regenerar() {
      if (!lastDream) {
        document.getElementById("status").textContent = "Primero generá una imagen.";
        return;
      }

      document.getElementById("dreamInput").value = lastDream;
      probarImagen();
    }

    async function shareDream() {
      const img = document.getElementById("dreamImage");

      if (!img.src) {
        alert("Primero generá una imagen");
        return;
      }

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Mi sueño en ONYRA",
            text: lastDream,
            url: img.src
          });
        } catch (error) {
          console.log("Compartir cancelado o no disponible", error);
        }
      } else {
        alert("Compartir no disponible en este navegador");
      }
    }

    renderHistory();
  </script>
</body>
</html>
