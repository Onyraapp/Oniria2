<!DOCTYPE html>
<html>
<body>

<input id="dreamInput" placeholder="Escribí tu sueño">
<button onclick="probarImagen()">Generar</button>

<p id="status"></p>
<img id="dreamImage" style="max-width:300px; display:none;" />

<script>
async function probarImagen() {
  const dream = document.getElementById("dreamInput").value;
  const status = document.getElementById("status");
  const img = document.getElementById("dreamImage");

  status.textContent = "Generando...";

  const res = await fetch("https://onyra-final-ok.almacenmujica.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ dream })
  });

  const data = await res.json();

  img.src = data.imageUrl;
  img.style.display = "block";
  status.textContent = "Listo";
}
</script>

</body>
</html>
