<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYRA</title>

<style>
body {
  margin:0;
  font-family: 'Helvetica Neue', sans-serif;
  background: linear-gradient(180deg,#0f0f1a,#1c1c2e);
  color:white;
}

.container {
  max-width: 420px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  font-weight:600;
  letter-spacing:2px;
}

textarea {
  width:100%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  font-size:14px;
  margin-top:15px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:12px;
  font-size:14px;
  cursor:pointer;
}

.primary {
  background:#6c5ce7;
  color:white;
}

.secondary {
  background:#2c2c3e;
  color:white;
}

.result-card {
  margin-top:20px;
  background:#1f1f2e;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.result-card img {
  width:100%;
  display:block;
}

.result-text {
  padding:15px;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
  font-size:12px;
}

#clearBtn {
  position:fixed;
  top:10px;
  right:10px;
  width:auto;
  padding:8px 12px;
  font-size:11px;
  background:#2c2c3e;
}
</style>
</head>

<body>

<button id="clearBtn" onclick="clearAll()">Limpiar</button>

<div class="container">

<h1>ONYRA</h1>

<textarea id="dreamInput" placeholder="Contá tu sueño..."></textarea>

<button class="primary" onclick="submitDream()">Interpretar</button>

<div id="result"></div>

<div class="actions" id="actions" style="display:none;">
  <button onclick="saveDream()">Guardar</button>
  <button onclick="shareDream()">Compartir sueño</button>
  <button onclick="toggleHistory()">Historial</button>
</div>

<div id="history" style="margin-top:20px;"></div>

</div>

<script>
const WORKER_URL = "https://onyra-worker.almacenmujica.workers.dev";

let currentDream = {};
let history = JSON.parse(localStorage.getItem("onyraHistory")) || [];

async function submitDream() {
  const dream = document.getElementById("dreamInput").value;

  if (!dream) return alert("Escribí un sueño");

  document.getElementById("result").innerHTML = "Interpretando...";

  try {
    const res = await fetch(WORKER_URL, {
      method:"POST",
      body: JSON.stringify({dream})
    });

    const data = await res.json();

    currentDream = {
      dream,
      interpretation: data.text,
      image: data.imageUrl
    };

    renderResult();
    document.getElementById("actions").style.display = "flex";

  } catch (err) {
    document.getElementById("result").innerHTML = "Error al interpretar";
    console.error(err);
  }
}

function renderResult() {
  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <img src="${currentDream.image}">
      <div class="result-text">
        <p>${currentDream.interpretation}</p>
      </div>
    </div>
  `;
}

function saveDream() {
  history.unshift(currentDream);
  localStorage.setItem("onyraHistory", JSON.stringify(history));
  alert("Guardado");
}

function toggleHistory() {
  const div = document.getElementById("history");

  if (div.innerHTML !== "") {
    div.innerHTML = "";
    return;
  }

  div.innerHTML = history.map(h => `
    <div style="margin-bottom:15px;">
      <img src="${h.image}" style="width:100%;border-radius:10px;">
      <p>${h.interpretation}</p>
    </div>
  `).join("");
}

function shareDream() {
  const text = `Soñé: ${currentDream.dream}\n\nInterpretación: ${currentDream.interpretation}`;

  if (navigator.share) {
    navigator.share({text});
  } else {
    navigator.clipboard.writeText(text);
    alert("Texto copiado");
  }
}

function clearAll() {
  document.getElementById("dreamInput").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("actions").style.display = "none";
}
</script>

</body>
</html>
